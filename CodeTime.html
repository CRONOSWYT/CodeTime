<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>CodeTime</title>

    <link rel="icon" href="icons/logo.ico" />
    <link rel="stylesheet" href="styles/general.css" />

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>

  <body>
    <div class="container">
      <header class="header" role="banner">
        <div class="header-content">
          <!-- Logo como icono principal -->
          <div class="logo-container">
            <img
              src="icons/logo.ico"
              alt="CodeTime - Logo de la plataforma de referencia de código"
              class="logo-icon"
              width="48"
              height="48"
            />
            <h1 class="visually-hidden">CodeTime</h1>
          </div>
         <div class="header-actions">
            <div class="home-button">
            <a href="https://discord.gg/yJ6Mn5CAG" class="btn-home">
              <i class="fab fa-discord"></i>
              <span>discord</span>
            </a>
          </div>
          <div class="home-button">
            <button id="loginBtn" class="btn-home">Inicio de Sesión</button>
            <button id="logoutBtn" class="btn-home" style="display:none;"><i class="fa-solid fa-right-to-bracket"></i> Cerrar sesión</button>
          </div>
        </div>
      </header>

      <main class="content">
        <section class="welcome-section">
          <h1>CodeTime</h1>

          <div class="total-counter">
            <h2>Total: <span id="totalCount">0</span></h2>
            <p id="totalText">Cargando...</p>
          </div>
          </section>
          <div class="search-container">
            <div class="search-box">
              <i class="fas fa-search search-icon"></i>
              <input
                type="text"
                id="searchInput"
                placeholder="Buscar lenguajes..."
              />
            </div>
            <button id="clearSearch" class="clear-btn" aria-label="Limpiar búsqueda">
              <i class="fas fa-times"></i>
            </button>
          </div>
          <button id="addLangBtn" class="btn btn_language" style="display: none">
            <i class="fas fa-plus"></i> Nuevo Lenguaje
          </button>

          <section class="language-grid" id="languageGrid"></section>
        
      </main>

      <footer class="site-footer">
        <p>© 2026 CodeTime</p>
      </footer>
    </div>

    <!-- MODAL -->
    <div id="modal" class="modal">
      <div class="modal-content">
        <button class="modal-close" id="closeModal">&times;</button>
        <div class="modal-header">
          <h2>Nuevo Lenguaje</h2>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label for="name">Nombre:</label>
            <input id="name" placeholder="Nombre (HTML)" />
          </div>
          <div class="form-group">
            <label for="icon">Icono:</label>
            <input id="icon" placeholder="Icono (fab fa-html5)" />
          </div>
          <div class="form-group">
            <label for="desc">Descripción:</label>
            <textarea id="desc" placeholder="Descripción"></textarea>
          </div>
          <div class="modal-actions">
            <button id="saveBtn" class="btn ">Guardar</button>
            <br>
            <button id="closeModalBtn" class="btn">Cancelar</button>
          </div>
        </div>
      </div>
    </div>

    <!-- MODAL PERFIL -->
    <div id="profileModal" class="modal">
      <div class="modal-content">
        <button class="modal-close" id="closeProfileModal">&times;</button>
        <div class="modal-header">
          <h2>Completa tu perfil</h2>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label for="profileUsername">Nombre de usuario:</label>
            <input id="profileUsername" placeholder="Nombre visible en la plataforma" maxlength="50" />
          </div>
          <button id="saveProfileBtn" class="btn btn-primary">Guardar perfil</button>
        </div>
      </div>
    </div>

    <div id="reportModal" class="modal">
      <div class="modal-content">
        <button class="modal-close" id="closeReportModal">&times;</button>
        <div class="modal-header">
          <h2 id="reportModalTitle">Reportar</h2>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label>Qué deseas reportar</label>
            <input id="reportTargetDisplay" type="text" readonly />
          </div>
          <div class="form-group">
            <label for="reportDescription">Descripción del reporte</label>
            <textarea id="reportDescription" placeholder="Explica el motivo del reporte" rows="4"></textarea>
          </div>
          <div class="modal-actions">
            <button id="submitReportBtn" class="btn btn-primary">Enviar reporte</button>
            <button id="cancelReportBtn" class="btn btn-secondary">Cancelar</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const supabase = window.supabase.createClient(
          "https://ttmrvogucsmujegurmvi.supabase.co",
          "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0bXJ2b2d1Y3NtdWplZ3VybXZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MDE2OTIsImV4cCI6MjA5Mjk3NzY5Mn0.8NrHzYYIXrTYOpdLJafAemXnZ8bJ1DhVwSU7hQx_3pQ",
        );

        let user = null;
        let allLanguages = [];
        let languageLikes = new Map();
        let userLikedLanguages = new Set();

        const loginBtn = document.getElementById("loginBtn");
        const logoutBtn = document.getElementById("logoutBtn");
        const addLangBtn = document.getElementById("addLangBtn");
        const searchInput = document.getElementById("searchInput");
        const clearSearch = document.getElementById("clearSearch");

        loginBtn.onclick = () => {
          window.location.href = 'login.html';
        };

        logoutBtn.onclick = async () => {
          await supabase.auth.signOut();
          localStorage.removeItem('user');
          localStorage.removeItem('session');
          location.reload();
        };

        async function getUser() {
          // Primero intentar leer del localStorage
          const storedUser = localStorage.getItem('user');
          const storedSession = localStorage.getItem('session');

          if (storedUser && storedSession) {
            user = JSON.parse(storedUser);
          } else {
            // Si no hay en localStorage, verificar con Supabase
            const { data } = await supabase.auth.getSession();
            user = data?.session?.user || null;

            // Si Supabase tiene sesión, guardarla en localStorage
            if (user) {
              localStorage.setItem('user', JSON.stringify(user));
              localStorage.setItem('session', JSON.stringify(data.session));
            }
          }

          loginBtn.style.display = user ? "none" : "block";
          logoutBtn.style.display = user ? "block" : "none";
          addLangBtn.style.display = user ? "block" : "none";

          if (user) {
            const { data: perfil } = await supabase
              .from('perfiles')
              .select('role_id')
              .eq('id', user.id)
              .maybeSingle();

            if (perfil?.role_id === 2) {
              const adminBtn = document.createElement('button');
              adminBtn.className = 'btn-home';
              adminBtn.innerHTML = '<i class="fas fa-cog"></i> Admin';
              adminBtn.onclick = () => window.location.href = 'admin.html';
              document.querySelector('.header-actions').appendChild(adminBtn);
            }

            if (!perfil) {
              showProfileModal();
            }
          }
        }

        function showProfileModal() {
          document.getElementById('profileModal').style.display = 'block';
        }

        function hideProfileModal() {
          document.getElementById('profileModal').style.display = 'none';
        }

        async function saveProfile() {
          const usernameValue = document.getElementById('profileUsername').value.trim();
          if (!usernameValue || usernameValue.length < 3) {
            return alert('El nombre de usuario debe tener al menos 3 caracteres');
          }

          const { error } = await supabase
            .from('perfiles')
            .insert({ id: user.id, username: usernameValue });

          if (error) {
            alert('Error guardando el perfil: ' + error.message);
            return;
          }

          hideProfileModal();
          loadLanguages();
        }

        /* =========================
   CARGAR
========================= */

        async function loadLanguages() {
          const { data } = await supabase
            .from("languages")
            .select("*")
            .order("name");

          if (data) {
            allLanguages = data;
            await loadLanguageLikes(allLanguages.map((lang) => lang.id));
            allLanguages.sort((a, b) => {
              const aLikes = languageLikes.get(a.id) || 0;
              const bLikes = languageLikes.get(b.id) || 0;
              if (bLikes !== aLikes) return bLikes - aLikes;
              return (a.name || '').localeCompare(b.name || '');
            });
          } else {
            allLanguages = [];
          }

          renderLanguages(allLanguages);
        }

        async function loadLanguageLikes(languageIds) {
          if (!languageIds.length) {
            languageLikes = new Map();
            userLikedLanguages = new Set();
            return;
          }

          const { data: likeRows, error } = await supabase
            .from('likes_languages')
            .select('language_id, user_id')
            .in('language_id', languageIds);

          if (error) {
            console.warn('Error cargando likes de lenguajes:', error.message);
            languageLikes = new Map();
            userLikedLanguages = new Set();
            return;
          }

          const counts = new Map();
          const liked = new Set();

          (likeRows || []).forEach((row) => {
            counts.set(row.language_id, (counts.get(row.language_id) || 0) + 1);
            if (user && row.user_id === user.id) {
              liked.add(row.language_id);
            }
          });

          languageLikes = counts;
          userLikedLanguages = liked;
        }

        async function toggleLanguageLike(languageId) {
          if (!user) {
            return alert('Debes iniciar sesión para dar like');
          }

          const alreadyLiked = userLikedLanguages.has(languageId);

          if (alreadyLiked) {
            const { error } = await supabase
              .from('likes_languages')
              .delete()
              .match({ language_id: languageId, user_id: user.id });
            if (error) return alert('Error quitando like: ' + error.message);
          } else {
            const { error } = await supabase
              .from('likes_languages')
              .insert({ language_id: languageId, user_id: user.id });
            if (error) return alert('Error guardando like: ' + error.message);
          }

          await loadLanguageLikes(allLanguages.map((lang) => lang.id));
          renderLanguages(allLanguages);
        }

        /* =========================
   RENDER
========================= */

        function renderLanguages(languages) {
          const grid = document.getElementById("languageGrid");
          grid.innerHTML = "";

          languages.forEach((lang) => {
            const likeCount = languageLikes.get(lang.id) || 0;
            const liked = userLikedLanguages.has(lang.id);
            const el = document.createElement("div");
            el.className = "language-card";

            el.onclick = () => {
              window.location.href = `language.html?lang=${encodeURIComponent(lang.name)}`;
            };

            el.innerHTML = `
<div class="language-icon">
<i class="${lang.icon}"></i>
</div>
<h3>${lang.name}</h3>
<p>${lang.description || ""}</p>
<div class="language-card-meta">
  <span class="likes-count"><i class="fas fa-heart"></i> ${likeCount}</span>
  <div class="language-card-actions">
    <button class="btn btn-like" data-language-id="${lang.id}">${liked ? '💖' : '🤍'}</button>
    <button class="btn btn-secondary report-lang-btn" data-language-id="${lang.id}" data-language-name="${lang.name}"><i class="fas fa-flag"></i></button>
  </div>
</div>
`;

            const likeButton = el.querySelector('.btn-like');
            likeButton.onclick = (event) => {
              event.stopPropagation();
              toggleLanguageLike(lang.id);
            };

            const reportBtn = el.querySelector('.report-lang-btn');
            reportBtn.onclick = (event) => {
              event.stopPropagation();
              openReportModal('language', lang.id, lang.name, lang.user_id);
            };

            grid.appendChild(el);
          });

          updateCounter(languages);
        }

        /* =========================
   CONTADOR
========================= */

        function updateCounter(languages) {
          const total = languages.length;

          document.getElementById("totalCount").textContent = total;
          document.getElementById("totalText").textContent =
            `${total} lenguajes disponibles`;
        }

        /* =========================
   CREAR LENGUAJE
========================= */

        const modal = document.getElementById("modal");

        addLangBtn.onclick = () => {
          modal.style.display = "block";
        };

        document.getElementById("closeModal").onclick = () => {
          modal.style.display = "none";
        };

        document.getElementById("closeModalBtn").onclick = () => {
          modal.style.display = "none";
        };

        document.getElementById('closeProfileModal').onclick = hideProfileModal;
        document.getElementById('saveProfileBtn').onclick = saveProfile;

        document.getElementById("saveBtn").onclick = async () => {
          if (!user) return alert("Debes iniciar sesión");

          const name = document.getElementById("name").value;
          const icon = document.getElementById("icon").value;
          const desc = document.getElementById("desc").value;

          if (!name) return alert("Nombre obligatorio");

          const { error } = await supabase.from("languages").insert([
            {
              name,
              icon,
              description: desc,
              is_active: true,
              element_count: 0,
              user_id: user.id,
            },
          ]);

          if (error) {
            alert(error.message);
            return;
          }

          modal.style.display = "none";
          loadLanguages();
        };

        const reportModal = document.getElementById('reportModal');
        const closeReportModal = document.getElementById('closeReportModal');
        const cancelReportBtn = document.getElementById('cancelReportBtn');
        const submitReportBtn = document.getElementById('submitReportBtn');
        let reportTarget = null;

        function openReportModal(entityType, targetId, targetName, targetOwnerId) {
          if (!user) {
            return alert('Debes iniciar sesión para reportar');
          }
          reportTarget = { entityType, targetId, targetName, targetOwnerId };
          document.getElementById('reportModalTitle').textContent = `Reportar ${entityType}`;
          document.getElementById('reportTargetDisplay').value = `${entityType}: ${targetName}`;
          document.getElementById('reportDescription').value = '';
          reportModal.style.display = 'block';
        }

        closeReportModal.onclick = () => {
          reportModal.style.display = 'none';
          reportTarget = null;
        };
        cancelReportBtn.onclick = () => {
          reportModal.style.display = 'none';
          reportTarget = null;
        };

        submitReportBtn.onclick = async () => {
          const description = document.getElementById('reportDescription').value.trim();
          if (!description) return alert('Describe claramente el motivo del reporte');
          if (!reportTarget) return alert('No hay objetivo de reporte');

          const { error } = await supabase.from('reports').insert([{ 
            entity_type: reportTarget.entityType,
            target_id: reportTarget.targetId.toString(),
            target_name: reportTarget.targetName,
            target_owner_id: reportTarget.targetOwnerId || null,
            reporter_id: user.id,
            description,
          }]);

          if (error) return alert('Error enviando reporte: ' + error.message);
          reportModal.style.display = 'none';
          alert('Reporte enviado correctamente');
        };

        searchInput.addEventListener("input", (e) => {
          const term = e.target.value.toLowerCase().trim();
          if (!term) return renderLanguages(allLanguages);

          const filtered = allLanguages.filter(
            (lang) =>
              (lang.name || "").toLowerCase().includes(term) ||
              (lang.description || "").toLowerCase().includes(term),
          );

          renderLanguages(filtered);
        });

        clearSearch.onclick = () => {
          searchInput.value = "";
          renderLanguages(allLanguages);
        };

        window.onclick = (event) => {
          if (event.target === modal) {
            modal.style.display = "none";
          }
          if (event.target === document.getElementById('profileModal')) {
            hideProfileModal();
          }
          if (event.target === reportModal) {
            reportModal.style.display = 'none';
          }
        };

        /* =========================
   INIT
========================= */

        getUser().then(loadLanguages);
      });
    </script>
  </body>
</html>
