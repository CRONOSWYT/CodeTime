<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>CodeTime - Admin</title>

    <link rel="icon" href="icons/logo.ico" />
    <link rel="stylesheet" href="styles/general.css" />

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>

  <body>
    <div id="loader">
      <video src="video/carga.webm" autoplay loop muted></video>
    </div>
    <script>
      window.addEventListener('DOMContentLoaded', () => {
        const loader = document.getElementById('loader');
        setTimeout(() => {
          if (loader) loader.classList.add('hidden');
        }, 3000); // 3000 = 3 segundos
      });
    </script>

    <div class="container">
      <header class="header" role="banner">
        <div class="contenido_encabezado">
          <div class="contenedor_logo">
            <img
              src="icons/logo.ico"
              alt="CodeTime - Logo de la plataforma de referencia de código"
              class="logo_icon"
              width="48"
              height="48"
            />
            <h1>CodeTime - Admin</h1>
          </div>
          <div class="acciones_encabezado">
            <div class="contenedor_boton_inicio">
              <a href="CodeTime.html" class="boton_inicio">
                <i class="fas fa-home"></i>
                <span>Inicio</span>
              </a>
            </div>
            <div class="contenedor_boton_inicio">
              <button id="boton_cerrar_sesion" class="boton_inicio">
                <i class="fa-solid fa-right-to-bracket"></i> Cerrar sesión
              </button>
            </div>
          </div>
        </div>
      </header>

      <main class="content">
        <section class="seccion_admin">
          <h1>Panel de Administración</h1>

          <div class="pestanias_admin">
            <button id="pestania_tarjetas" class="boton_pestania active">
              Tarjetas
            </button>
            <button id="pestania_lenguajes" class="boton_pestania">
              Lenguajes
            </button>
            <button id="pestania_usuarios" class="boton_pestania">
              Usuarios
            </button>
            <button id="pestania_reportes" class="boton_pestania">
              Reportes
            </button>
            <button id="pestania_logs" class="boton_pestania">
              Logs
            </button>
          </div>

          <div id="contenido_pestania_tarjetas" class="contenido_pestania">
            <div class="contenedor_busqueda">
              <div class="caja_busqueda">
                <i class="fas fa-search icono_busqueda"></i>
                <input
                  type="text"
                  id="busqueda_tarjetas_admin"
                  placeholder="Buscar tarjetas por título, descripción o usuario..."
                />
              </div>
              <button
                id="boton_limpiar_busqueda_tarjetas_admin"
                class="boton_limpiar"
                aria-label="Limpiar búsqueda de tarjetas"
              >
                <i class="fas fa-times"></i>
              </button>
            </div>
            <div class="acciones_admin">
              <button
                id="boton_eliminar_tarjetas_admin"
                class="btn boton_peligro"
              >
                <i class="fas fa-trash"></i> Eliminar Seleccionadas
              </button>
            </div>
            <div class="lista_tarjetas" id="lista_tarjetas_admin"></div>
          </div>

          <div
            id="contenido_pestania_lenguajes"
            class="contenido_pestania"
            style="display: none"
          >
            <div class="contenedor_busqueda">
              <div class="caja_busqueda">
                <i class="fas fa-search icono_busqueda"></i>
                <input
                  type="text"
                  id="busqueda_lenguajes_admin"
                  placeholder="Buscar lenguajes..."
                />
              </div>
              <button
                id="boton_limpiar_busqueda_lenguajes_admin"
                class="boton_limpiar"
                aria-label="Limpiar búsqueda de lenguajes"
              >
                <i class="fas fa-times"></i>
              </button>
            </div>
            <div class="acciones_admin">
              <button
                id="boton_eliminar_lenguajes_admin"
                class="btn boton_peligro"
              >
                <i class="fas fa-trash"></i> Eliminar Seleccionados
              </button>
            </div>
            <div class="lista_lenguajes" id="lista_lenguajes_admin"></div>
          </div>

          <div
            id="contenido_pestania_usuarios"
            class="contenido_pestania"
            style="display: none"
          >
            <div class="contenedor_busqueda">
              <div class="caja_busqueda">
                <i class="fas fa-search icono_busqueda"></i>
                <input
                  type="text"
                  id="busqueda_usuarios_admin"
                  placeholder="Buscar usuarios por nombre o rol..."
                />
              </div>
              <button
                id="boton_limpiar_busqueda_usuarios_admin"
                class="boton_limpiar"
                aria-label="Limpiar búsqueda de usuarios"
              >
                <i class="fas fa-times"></i>
              </button>
            </div>
            <div class="acciones_admin">
              <button
                id="boton_eliminar_usuarios_admin"
                class="btn boton_peligro"
              >
                <i class="fas fa-trash"></i> Eliminar Seleccionados
              </button>
            </div>
            <div class="lista_usuarios" id="lista_usuarios_admin"></div>
          </div>

          <div
            id="contenido_pestania_reportes"
            class="contenido_pestania"
            style="display: none"
          >
            <div class="contenedor_busqueda">
              <div class="caja_busqueda">
                <i class="fas fa-search icono_busqueda"></i>
                <input
                  type="text"
                  id="busqueda_reportes_admin"
                  placeholder="Buscar reportes por entidad, usuario o estado..."
                />
              </div>
              <button
                id="boton_limpiar_busqueda_reportes_admin"
                class="boton_limpiar"
                aria-label="Limpiar búsqueda de reportes"
              >
                <i class="fas fa-times"></i>
              </button>
            </div>
            <div class="acciones_admin">
              <button
                id="boton_eliminar_reportes_admin"
                class="btn boton_peligro"
              >
                <i class="fas fa-trash"></i> Eliminar Seleccionados
              </button>
            </div>
            <div class="lista_reportes" id="lista_reportes_admin"></div>
          </div>

          <div id="contenido_pestania_logs" class="contenido_pestania" style="display: none">
            <div class="contenedor_busqueda">
              <div class="caja_busqueda">
                <i class="fas fa-search icono_busqueda"></i>
                <input
                  type="text"
                  id="busqueda_logs_admin"
                  placeholder="Buscar logs por usuario, acción o entidad..."
                />
              </div>
              <button
                id="boton_limpiar_busqueda_logs_admin"
                class="boton_limpiar"
                aria-label="Limpiar búsqueda de logs"
              >
                <i class="fas fa-times"></i>
              </button>
            </div>

            <!-- Filtros por fecha -->
            <div class="filtros_logs">
              <div class="grupo_filtro">
                <label for="fecha_inicio_logs">Desde:</label>
                <input type="date" id="fecha_inicio_logs" />
              </div>
              <div class="grupo_filtro">
                <label for="fecha_fin_logs">Hasta:</label>
                <input type="date" id="fecha_fin_logs" />
              </div>
              <button id="boton_aplicar_filtro_fechas" class="btn boton_primario">
                <i class="fas fa-filter"></i> Filtrar
              </button>
              <button id="boton_limpiar_filtro_fechas" class="btn boton_secundario">
                <i class="fas fa-times"></i> Limpiar filtro
              </button>
            </div>

            <div class="tabla_responsive">
              <table>
                <thead>
                  <tr>
                    <th>Usuario</th>
                    <th>Acción</th>
                    <th>Tipo de Entidad</th>
                    <th>Descripción de Cambios</th>
                    <th>Fecha y Hora</th>
                  </tr>
                </thead>
                <tbody id="lista_logs_admin"></tbody>
              </table>
            </div>
          </div>
        </section>

        <div id="modal_admin" class="modal">
          <div class="modal_contenido">
            <button class="modal_cerrar" id="cerrar_modal_admin">
              &times;
            </button>
            <div class="modal_encabezado">
              <h2 id="titulo_modal_admin">Editar</h2>
            </div>
            <div class="modal_cuerpo" id="cuerpo_modal_admin"></div>
            <div class="modal_acciones">
              <button id="boton_guardar_modal_admin" class="btn boton_primario">
                Guardar
              </button>
              <button
                id="boton_cancelar_modal_admin"
                class="btn boton_secundario"
              >
                Cancelar
              </button>
            </div>
          </div>
        </div>

        <!-- Modal para ver detalles de logs -->
        <div id="modal_detalles_log" class="modal">
          <div class="modal_contenido modal_detalles_contenido">
            <button class="modal_cerrar" id="cerrar_modal_detalles_log">
              &times;
            </button>
            <div class="modal_encabezado">
              <h2>Detalles del Cambio</h2>
            </div>
            <div class="modal_cuerpo" id="cuerpo_modal_detalles_log"></div>
            <div class="modal_acciones">
              <button id="boton_cerrar_detalles_log" class="btn boton_secundario">
                Cerrar
              </button>
            </div>
          </div>
        </div>
      </main>

      <footer class="pie_sitio">
        <p>© 2026 CodeTime</p>
      </footer>
    </div>

    <!-- SWEETALERT2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/admin.js"></script>
  </body>
</html>
