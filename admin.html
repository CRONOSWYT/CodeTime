<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>CodeTime - Admin</title>

    <link rel="icon" href="icons/logo.ico" />
    <link rel="stylesheet" href="styles/general.css" />

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>

  <body>
    <div class="container">
      <header class="header" role="banner">
        <div class="contenido_encabezado">
          <div class="contenedor_logo">
            <img
              src="icons/logo.ico"
              alt="CodeTime - Logo de la plataforma de referencia de código"
              class="logo_icon"
              width="48"
              height="48"
            />
            <h1>CodeTime - Admin</h1>
          </div>
          <div class="acciones_encabezado">
            <div class="contenedor_boton_inicio">
              <a href="CodeTime.html" class="boton_inicio">
                <i class="fas fa-home"></i>
                <span>Inicio</span>
              </a>
            </div>
            <div class="contenedor_boton_inicio">
              <button id="boton_cerrar_sesion" class="boton_inicio"><i class="fa-solid fa-right-to-bracket"></i> Cerrar sesión</button>
            </div>
          </div>
        </div>
      </header>

      <main class="content">
        <section class="seccion_admin">
          <h1>Panel de Administración</h1>

          <div class="pestanias_admin">
            <button id="pestania_tarjetas" class="boton_pestania active">Tarjetas</button>
            <button id="pestania_lenguajes" class="boton_pestania">Lenguajes</button>
            <button id="pestania_usuarios" class="boton_pestania">Usuarios</button>
            <button id="pestania_reportes" class="boton_pestania">Reportes</button>
          </div>

          <div id="contenido_pestania_tarjetas" class="contenido_pestania">
            <div class="contenedor_busqueda">
              <div class="caja_busqueda">
                <i class="fas fa-search icono_busqueda"></i>
                <input
                  type="text"
                  id="busqueda_tarjetas_admin"
                  placeholder="Buscar tarjetas por título, descripción o usuario..."
                />
              </div>
              <button id="boton_limpiar_busqueda_tarjetas_admin" class="boton_limpiar" aria-label="Limpiar búsqueda de tarjetas">
                <i class="fas fa-times"></i>
              </button>
            </div>
            <div class="acciones_admin">
              <button id="boton_eliminar_tarjetas_admin" class="btn boton_peligro">
                <i class="fas fa-trash"></i> Eliminar Seleccionadas
              </button>
            </div>
            <div class="lista_tarjetas" id="lista_tarjetas_admin"></div>
          </div>

          <div id="contenido_pestania_lenguajes" class="contenido_pestania" style="display: none;">
            <div class="contenedor_busqueda">
              <div class="caja_busqueda">
                <i class="fas fa-search icono_busqueda"></i>
                <input
                  type="text"
                  id="busqueda_lenguajes_admin"
                  placeholder="Buscar lenguajes..."
                />
              </div>
              <button id="boton_limpiar_busqueda_lenguajes_admin" class="boton_limpiar" aria-label="Limpiar búsqueda de lenguajes">
                <i class="fas fa-times"></i>
              </button>
            </div>
            <div class="acciones_admin">
              <button id="boton_eliminar_lenguajes_admin" class="btn boton_peligro">
                <i class="fas fa-trash"></i> Eliminar Seleccionados
              </button>
            </div>
            <div class="lista_lenguajes" id="lista_lenguajes_admin"></div>
          </div>

          <div id="contenido_pestania_usuarios" class="contenido_pestania" style="display: none;">
            <div class="contenedor_busqueda">
              <div class="caja_busqueda">
                <i class="fas fa-search icono_busqueda"></i>
                <input
                  type="text"
                  id="busqueda_usuarios_admin"
                  placeholder="Buscar usuarios por nombre o rol..."
                />
              </div>
              <button id="boton_limpiar_busqueda_usuarios_admin" class="boton_limpiar" aria-label="Limpiar búsqueda de usuarios">
                <i class="fas fa-times"></i>
              </button>
            </div>
            <div class="acciones_admin">
              <button id="boton_eliminar_usuarios_admin" class="btn boton_peligro">
                <i class="fas fa-trash"></i> Eliminar Seleccionados
              </button>
            </div>
            <div class="lista_usuarios" id="lista_usuarios_admin"></div>
          </div>

          <div id="contenido_pestania_reportes" class="contenido_pestania" style="display: none;">
            <div class="contenedor_busqueda">
              <div class="caja_busqueda">
                <i class="fas fa-search icono_busqueda"></i>
                <input
                  type="text"
                  id="busqueda_reportes_admin"
                  placeholder="Buscar reportes por entidad, usuario o estado..."
                />
              </div>
              <button id="boton_limpiar_busqueda_reportes_admin" class="boton_limpiar" aria-label="Limpiar búsqueda de reportes">
                <i class="fas fa-times"></i>
              </button>
            </div>
            <div class="acciones_admin">
              <button id="boton_eliminar_reportes_admin" class="btn boton_peligro">
                <i class="fas fa-trash"></i> Eliminar Seleccionados
              </button>
            </div>
            <div class="lista_reportes" id="lista_reportes_admin"></div>
          </div>
        </section>

        <div id="modal_admin" class="modal">
          <div class="modal_contenido">
            <button class="modal_cerrar" id="cerrar_modal_admin">&times;</button>
            <div class="modal_encabezado">
              <h2 id="titulo_modal_admin">Editar</h2>
            </div>
            <div class="modal_cuerpo" id="cuerpo_modal_admin"></div>
            <div class="modal_acciones">
              <button id="boton_guardar_modal_admin" class="btn boton_primario">Guardar</button>
              <button id="boton_cancelar_modal_admin" class="btn boton_secundario">Cancelar</button>
            </div>
          </div>
        </div>
      </main>

      <footer class="pie_sitio">
        <p>© 2026 CodeTime</p>
      </footer>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const supabase = window.supabase.createClient(
          "https://ttmrvogucsmujegurmvi.supabase.co",
          "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0bXJ2b2d1Y3NtdWplZ3VybXZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MDE2OTIsImV4cCI6MjA5Mjk3NzY5Mn0.8NrHzYYIXrTYOpdLJafAemXnZ8bJ1DhVwSU7hQx_3pQ",
        );

        let user = null;
        let allCards = [];
        let allLanguages = [];
        let allUsers = [];
        let allRoles = [];
        let allReports = [];
        let usersMap = new Map(); // userId -> username
        let languageMap = new Map();
        let rolesMap = new Map();
        let currentAdminItem = null;
        let currentAdminType = null;

        const logoutBtn = document.getElementById("boton_cerrar_sesion");
        const tabCards = document.getElementById("pestania_tarjetas");
        const tabLanguages = document.getElementById("pestania_lenguajes");
        const tabUsers = document.getElementById("pestania_usuarios");
        const tabReports = document.getElementById("pestania_reportes");
        const cardsTab = document.getElementById("contenido_pestania_tarjetas");
        const languagesTab = document.getElementById("contenido_pestania_lenguajes");
        const usersTab = document.getElementById("contenido_pestania_usuarios");
        const reportsTab = document.getElementById("contenido_pestania_reportes");
        const searchCards = document.getElementById("busqueda_tarjetas_admin");
        const clearSearchCards = document.getElementById("boton_limpiar_busqueda_tarjetas_admin");
        const deleteSelectedCards = document.getElementById("boton_eliminar_tarjetas_admin");
        const cardsList = document.getElementById("lista_tarjetas_admin");
        const searchLanguages = document.getElementById("busqueda_lenguajes_admin");
        const clearSearchLanguages = document.getElementById("boton_limpiar_busqueda_lenguajes_admin");
        const deleteSelectedLanguages = document.getElementById("boton_eliminar_lenguajes_admin");
        const languagesList = document.getElementById("lista_lenguajes_admin");
        const searchUsers = document.getElementById("busqueda_usuarios_admin");
        const clearSearchUsers = document.getElementById("boton_limpiar_busqueda_usuarios_admin");
        const deleteSelectedUsers = document.getElementById("boton_eliminar_usuarios_admin");
        const usersList = document.getElementById("lista_usuarios_admin");
        const searchReports = document.getElementById("busqueda_reportes_admin");
        const clearSearchReports = document.getElementById("boton_limpiar_busqueda_reportes_admin");
        const deleteSelectedReports = document.getElementById("boton_eliminar_reportes_admin");
        const reportsList = document.getElementById("lista_reportes_admin");
        const adminModal = document.getElementById("modal_admin");
        const closeAdminModal = document.getElementById("cerrar_modal_admin");
        const saveAdminModalBtn = document.getElementById("boton_guardar_modal_admin");
        const cancelAdminModalBtn = document.getElementById("boton_cancelar_modal_admin");
        const adminModalTitle = document.getElementById("titulo_modal_admin");
        const adminModalBody = document.getElementById("cuerpo_modal_admin");

        logoutBtn.onclick = async () => {
          await supabase.auth.signOut();
          localStorage.removeItem('user');
          localStorage.removeItem('session');
          window.location.href = 'login.html';
        };

        async function getUser() {
          const storedUser = localStorage.getItem('user');
          const storedSession = localStorage.getItem('session');

          if (storedUser && storedSession) {
            user = JSON.parse(storedUser);
          } else {
            const { data } = await supabase.auth.getSession();
            user = data?.session?.user || null;
            if (user) {
              localStorage.setItem('user', JSON.stringify(user));
              localStorage.setItem('session', JSON.stringify(data.session));
            }
          }

          if (!user) {
            window.location.href = 'login.html';
            return;
          }

          const { data: perfil } = await supabase
            .from('perfiles')
            .select('role_id')
            .eq('id', user.id)
            .maybeSingle();

          if (!perfil || perfil.role_id !== 2) {
Swal.fire({
              icon: "error",
              title: "Acceso denegado",
              text: "Solo administradores"
            });
            window.location.href = 'CodeTime.html';
            return;
          }

          loadData();
        }

        async function loadData() {
          await loadRoles();
          await loadLanguages();
          await loadCards();
          await loadUsers();
          await loadReports();
        }

        async function loadCards() {
          const { data, error } = await supabase
            .from("cards")
            .select("*")
            .order("created_at", { ascending: false });

          if (error) {
            console.error(error);
            return;
          }

          allCards = data || [];

          const userIds = [...new Set(allCards.map(c => c.user_id).filter(Boolean))];
          if (userIds.length > 0) {
            const { data: profiles } = await supabase
              .from('perfiles')
              .select('id, username')
              .in('id', userIds);
            usersMap = new Map((profiles || []).map(p => [p.id, p.username]));
          } else {
            usersMap = new Map();
          }

          renderCards(allCards);
        }

        async function loadLanguages() {
          const { data } = await supabase
            .from("languages")
            .select("*")
            .order("name");

          allLanguages = data || [];
          languageMap = new Map(allLanguages.map(lang => [lang.id, lang.name]));
          renderLanguages(allLanguages);
        }

        async function loadRoles() {
          const { data, error } = await supabase
            .from('roles')
            .select('*')
            .order('id');

          allRoles = data || [];
          rolesMap = new Map(allRoles.map(role => [role.id, role.name]));
        }

        async function loadUsers() {
          const { data, error } = await supabase
            .from('perfiles')
            .select('id, username, role_id')
            .order('username');

          if (error) {
            console.error('Error cargando usuarios:', error);
            allUsers = [];
          } else {
            allUsers = data || [];
          }
          usersMap = new Map(allUsers.map((userItem) => [userItem.id, userItem.username]));
          renderUsers(allUsers);
        }

        async function loadReports() {
          const { data, error } = await supabase
            .from('reports')
            .select('*')
            .order('created_at', { ascending: false });

          if (error) {
            console.error('Error cargando reportes:', error);
            allReports = [];
          } else {
            allReports = data || [];
          }
          renderReports(allReports);
        }

        function renderCards(cards) {
          cardsList.innerHTML = "";
          cards.forEach((card) => {
            const el = document.createElement("div");
            el.className = "item_tarjeta";
            el.innerHTML = `
              <input type="checkbox" class="check_tarjeta" data-id="${card.id}">
              <div class="contenido_tarjeta">
                <h3>${card.titulo}</h3>
                <p><strong>Lenguaje:</strong> ${card.language || languageMap.get(card.language_id) || 'N/A'}</p>
                <p><strong>Usuario:</strong> ${usersMap.get(card.user_id) || 'N/A'}</p>
                <p><strong>Descripción:</strong> ${card.descripcion || ''}</p>
                <p><strong>Creado:</strong> ${new Date(card.created_at).toLocaleDateString()}</p>
                <button class="btn boton_secundario boton_editar_tarjeta" data-id="${card.id}">Editar</button>
              </div>
            `;
            cardsList.appendChild(el);
          });
        }

        function renderLanguages(languages) {
          languagesList.innerHTML = "";
          languages.forEach((lang) => {
            const el = document.createElement("div");
            el.className = "item_lenguaje";
            el.innerHTML = `
              <input type="checkbox" class="check_lenguaje" data-id="${lang.id}">
              <div class="contenido_lenguaje">
                <h3>${lang.name}</h3>
                <p>${lang.description || ''}</p>
                <p><strong>Elementos:</strong> ${lang.element_count}</p>
                <button class="btn boton_secundario boton_editar_lenguaje" data-id="${lang.id}">Editar</button>
              </div>
            `;
            languagesList.appendChild(el);
          });
        }

        function renderUsers(users) {
          usersList.innerHTML = "";
          users.forEach((userItem) => {
            const el = document.createElement("div");
            el.className = "item_lenguaje";
            el.innerHTML = `
              <input type="checkbox" class="check_usuario" data-id="${userItem.id}">
              <div class="contenido_lenguaje">
                <h3>${userItem.username}</h3>
                <p><strong>Rol:</strong> ${rolesMap.get(userItem.role_id) || 'usuario'}</p>
                <p><strong>ID:</strong> ${userItem.id}</p>
                <button class="btn boton_secundario boton_editar_usuario" data-id="${userItem.id}">Editar</button>
              </div>
            `;
            usersList.appendChild(el);
          });
        }

        function renderReports(reports) {
          reportsList.innerHTML = "";
          reports.forEach((report) => {
            const el = document.createElement("div");
            el.className = "item_lenguaje";
            el.innerHTML = `
              <input type="checkbox" class="check_reporte" data-id="${report.id}">
              <div class="contenido_lenguaje">
                <h3>${report.entity_type.toUpperCase()} - ${report.target_name || report.target_id}</h3>
                <p><strong>Estado:</strong> ${report.status}</p>
                <p><strong>Reportado por:</strong> ${usersMap.get(report.reporter_id) || report.reporter_id}</p>
                ${report.target_owner_id ? `<p><strong>Creado por:</strong> ${usersMap.get(report.target_owner_id) || report.target_owner_id}</p>` : ''}
                <p><strong>Fecha:</strong> ${new Date(report.created_at).toLocaleString()}</p>
                <p>${report.description || ''}</p>
                <button class="btn boton_secundario boton_ver_reporte" data-id="${report.id}">Ver / Actualizar</button>
              </div>
            `;
            reportsList.appendChild(el);
          });
        }

        function hideAllAdminTabs() {
          cardsTab.style.display = 'none';
          languagesTab.style.display = 'none';
          usersTab.style.display = 'none';
          reportsTab.style.display = 'none';
          tabCards.classList.remove('active');
          tabLanguages.classList.remove('active');
          tabUsers.classList.remove('active');
          tabReports.classList.remove('active');
        }

        tabCards.onclick = () => {
          hideAllAdminTabs();
          tabCards.classList.add('active');
          cardsTab.style.display = 'block';
        };

        tabLanguages.onclick = () => {
          hideAllAdminTabs();
          tabLanguages.classList.add('active');
          languagesTab.style.display = 'block';
        };

        tabUsers.onclick = () => {
          hideAllAdminTabs();
          tabUsers.classList.add('active');
          usersTab.style.display = 'block';
        };

        tabReports.onclick = () => {
          hideAllAdminTabs();
          tabReports.classList.add('active');
          reportsTab.style.display = 'block';
        };

        searchCards.oninput = () => {
          const query = searchCards.value.toLowerCase();
          const filtered = allCards.filter(card =>
            (card.titulo || '').toLowerCase().includes(query) ||
            (card.descripcion || '').toLowerCase().includes(query) ||
            (usersMap.get(card.user_id) || '').toLowerCase().includes(query)
          );
          renderCards(filtered);
        };

        clearSearchCards.onclick = () => {
          searchCards.value = '';
          renderCards(allCards);
        };

        searchUsers.oninput = () => {
          const query = searchUsers.value.toLowerCase();
          const filtered = allUsers.filter(userItem =>
            (userItem.username || '').toLowerCase().includes(query) ||
            (rolesMap.get(userItem.role_id) || '').toLowerCase().includes(query)
          );
          renderUsers(filtered);
        };

        clearSearchUsers.onclick = () => {
          searchUsers.value = '';
          renderUsers(allUsers);
        };

        searchReports.oninput = () => {
          const query = searchReports.value.toLowerCase();
          const filtered = allReports.filter(report =>
            (report.entity_type || '').toLowerCase().includes(query) ||
            (report.target_name || '').toLowerCase().includes(query) ||
            (report.status || '').toLowerCase().includes(query) ||
            (usersMap.get(report.reporter_id) || '').toLowerCase().includes(query)
          );
          renderReports(filtered);
        };

        clearSearchReports.onclick = () => {
          searchReports.value = '';
          renderReports(allReports);
        };

        searchLanguages.oninput = () => {
          const query = searchLanguages.value.toLowerCase();
          const filtered = allLanguages.filter(lang =>
            lang.name.toLowerCase().includes(query) ||
            lang.description?.toLowerCase().includes(query)
          );
          renderLanguages(filtered);
        };

        clearSearchLanguages.onclick = () => {
          searchLanguages.value = '';
          renderLanguages(allLanguages);
        };

        document.body.addEventListener('click', async (event) => {
          const editCardBtn = event.target.closest('.boton_editar_tarjeta');
          const editLanguageBtn = event.target.closest('.boton_editar_lenguaje');

          if (editCardBtn) {
            const cardId = editCardBtn.dataset.id;
            const card = allCards.find((item) => item.id === cardId);
            if (!card) return;
            openAdminModal('card', card);
            return;
          }

          if (editLanguageBtn) {
            const languageId = editLanguageBtn.dataset.id;
            const lang = allLanguages.find((item) => item.id.toString() === languageId.toString());
            if (!lang) return;
            openAdminModal('language', lang);
            return;
          }

          const editUserBtn = event.target.closest('.boton_editar_usuario');
          if (editUserBtn) {
            const userId = editUserBtn.dataset.id;
            const userItem = allUsers.find((item) => item.id === userId);
            if (!userItem) return;
            openAdminModal('user', userItem);
            return;
          }

          const editReportBtn = event.target.closest('.boton_ver_reporte');
          if (editReportBtn) {
            const reportId = editReportBtn.dataset.id;
            const reportItem = allReports.find((item) => item.id === reportId);
            if (!reportItem) return;
            openAdminModal('report', reportItem);
            return;
          }
        });

        deleteSelectedCards.onclick = async () => {
          const selected = Array.from(document.querySelectorAll('.check_tarjeta:checked')).map(cb => cb.dataset.id);
          if (selected.length === 0) {
Swal.fire({
  icon: "warning",
  title: "Selección requerida",
  text: "Selecciona al menos una tarjeta",
  confirmButtonText: "Entendido"
});            return;
          }
          if (confirm(`¿Eliminar ${selected.length} tarjeta(s)?`)) {
            const { error } = await supabase
              .from('cards')
              .delete()
              .in('id', selected);
if (error) {
  Swal.fire({
    icon: "error",
    title: "Error",
    text: error.message
  });
}            else loadCards();
          }
        };

        deleteSelectedLanguages.onclick = async () => {
          const selected = Array.from(document.querySelectorAll('.check_lenguaje:checked')).map(cb => cb.dataset.id);
          if (selected.length === 0) {
            Swal.fire({
              icon: "warning",
              title: "Selección requerida",
              text: "Selecciona al menos un lenguaje",
              confirmButtonText: "Entendido"
            });
            return;
          }
          if (confirm(`¿Eliminar ${selected.length} lenguaje(s)?`)) {
            const { error } = await supabase
              .from('languages')
              .delete()
              .in('id', selected);
if (error) {
  Swal.fire({
    icon: "error",
    title: "Error",
    text: error.message
  });
}            else loadLanguages();
          }
        };

        deleteSelectedUsers.onclick = async () => {
          const selected = Array.from(document.querySelectorAll('.check_usuario:checked')).map(cb => cb.dataset.id);
          if (selected.length === 0) {
            Swal.fire({
              icon: "warning",
              title: "Selección requerida",
              text: "Selecciona al menos un usuario",
              confirmButtonText: "Entendido"
            });
            return;
          }
          if (confirm(`¿Eliminar ${selected.length} usuario(s) de perfiles?`)) {
            const { error } = await supabase
              .from('perfiles')
              .delete()
              .in('id', selected);
            if (error) {
              Swal.fire({
                icon: "error",
                title: "Error",
                text: error.message
              });
            } else {
              loadUsers();
            }
          }
        };

        closeAdminModal.onclick = closeAdminModalFn;
        cancelAdminModalBtn.onclick = closeAdminModalFn;
        window.onclick = (event) => {
          if (event.target === adminModal) closeAdminModalFn();
        };
        saveAdminModalBtn.onclick = saveAdminModal;

        getUser();

        function openAdminModal(type, item) {
          currentAdminType = type;
          currentAdminItem = item;
          adminModalTitle.textContent = type === 'card' ? 'Editar tarjeta' : type === 'language' ? 'Editar lenguaje' : type === 'user' ? 'Editar usuario' : 'Ver reporte';

          if (type === 'card') {
            adminModalBody.innerHTML = `
              <div class="grupo_formulario">
                <label>Título</label>
                <input type="text" id="campo_titulo_admin" value="${item.titulo || ''}" />
              </div>
              <div class="grupo_formulario">
                <label>Descripción</label>
                <textarea id="campo_descripcion_admin">${item.descripcion || ''}</textarea>
              </div>
              <div class="grupo_formulario">
                <label>Contenido</label>
                <textarea id="campo_contenido_admin">${item.contenido || ''}</textarea>
              </div>
              <div class="grupo_formulario">
                <label>Lenguaje</label>
                <select id="campo_id_lenguaje_admin">
                  ${allLanguages.map(lang => `<option value="${lang.id}" ${lang.id.toString() === (item.language_id || '').toString() ? 'selected' : ''}>${lang.name}</option>`).join('')}
                </select>
              </div>
            `;
          } else if (type === 'language') {
            adminModalBody.innerHTML = `
              <div class="grupo_formulario">
                <label>Nombre</label>
                <input type="text" id="campo_nombre_admin" value="${item.name || ''}" />
              </div>
              <div class="grupo_formulario">
                <label>Icono</label>
                <input type="text" id="campo_icono_admin" value="${item.icon || ''}" />
              </div>
              <div class="grupo_formulario">
                <label>Descripción</label>
                <textarea id="campo_descripcion_admin2">${item.description || ''}</textarea>
              </div>
              <div class="grupo_formulario">
                <label>Elementos</label>
                <input type="number" id="campo_cantidad_elementos_admin" value="${item.element_count || 0}" />
              </div>
            `;
          } else if (type === 'user') {
            adminModalBody.innerHTML = `
              <div class="grupo_formulario">
                <label>Nombre de usuario</label>
                <input type="text" id="campo_usuario_admin" value="${item.username || ''}" />
              </div>
              <div class="grupo_formulario">
                <label>Rol</label>
                <select id="campo_id_rol_admin">
                  ${allRoles.map(role => `<option value="${role.id}" ${role.id.toString() === (item.role_id || '').toString() ? 'selected' : ''}>${role.name}</option>`).join('')}
                </select>
              </div>
            `;
          } else if (type === 'report') {
            adminModalBody.innerHTML = `
              <div class="grupo_formulario">
                <label>Tipo</label>
                <input type="text" readonly value="${item.entity_type}" />
              </div>
              <div class="grupo_formulario">
                <label>Objetivo</label>
                <input type="text" readonly value="${item.target_name || item.target_id}" />
              </div>
              <div class="grupo_formulario">
                <label>Reportado por</label>
                <input type="text" readonly value="${usersMap.get(item.reporter_id) || item.reporter_id}" />
              </div>
              <div class="grupo_formulario">
                <label>Descripción</label>
                <textarea id="campo_descripcion_admin2">${item.description || ''}</textarea>
              </div>
              <div class="grupo_formulario">
                <label>Estado</label>
                <select id="campo_estado_reporte_admin">
                  <option value="pendiente" ${item.status === 'pendiente' ? 'selected' : ''}>pendiente</option>
                  <option value="resuelto" ${item.status === 'resuelto' ? 'selected' : ''}>resuelto</option>
                  <option value="rechazado" ${item.status === 'rechazado' ? 'selected' : ''}>rechazado</option>
                </select>
              </div>
            `;
          }

          adminModal.style.display = 'block';
        }

        function closeAdminModalFn() {
          adminModal.style.display = 'none';
          currentAdminType = null;
          currentAdminItem = null;
          adminModalBody.innerHTML = '';
        }

        async function saveAdminModal() {
          if (!currentAdminType || !currentAdminItem) return;

          if (currentAdminType === 'card') {
            const titulo = document.getElementById('campo_titulo_admin').value.trim();
            const descripcion = document.getElementById('campo_descripcion_admin').value.trim();
            const contenido = document.getElementById('campo_contenido_admin').value.trim();
            const language_id = document.getElementById('campo_id_lenguaje_admin').value;
            const { error } = await supabase.from('cards').update({
              titulo,
              descripcion,
              contenido,
              language_id,
              updated_at: new Date().toISOString(),
            }).eq('id', currentAdminItem.id);
if (error) {
  return Swal.fire({
    icon: "error",
    title: "Error guardando tarjeta",
    text: error.message
  });
}            loadCards();
          }

          if (currentAdminType === 'language') {
            const name = document.getElementById('campo_nombre_admin').value.trim();
            const icon = document.getElementById('campo_icono_admin').value.trim();
            const description = document.getElementById('campo_descripcion_admin2').value.trim();
            const element_count = parseInt(document.getElementById('campo_cantidad_elementos_admin').value, 10) || 0;
            const { error } = await supabase.from('languages').update({
              name,
              icon,
              description,
              element_count,
            }).eq('id', currentAdminItem.id);
            if (error) {
              return Swal.fire({
                icon: "error",
                title: "Error guardando lenguaje",
                text: error.message
              });
            }
            loadLanguages();
          }

          if (currentAdminType === 'user') {
            const username = document.getElementById('campo_usuario_admin').value.trim();
            const role_id = parseInt(document.getElementById('campo_id_rol_admin').value, 10);
            const { error } = await supabase.from('perfiles').update({
              username,
              role_id,
            }).eq('id', currentAdminItem.id);
            if (error) {
              return Swal.fire({
                icon: "error",
                title: "Error guardando usuario",
                text: error.message
              });
            }
            loadUsers();
          }

          if (currentAdminType === 'report') {
            const description = document.getElementById('campo_descripcion_admin2').value.trim();
            const status = document.getElementById('campo_estado_reporte_admin').value;
            const { error } = await supabase.from('reports').update({
              description,
              status,
            }).eq('id', currentAdminItem.id);
            if (error) {
              return Swal.fire({
                icon: "error",
                title: "Error guardando reporte",
                text: error.message
              });
            }
            loadReports();
          }

          closeAdminModalFn();
        }
      });
    </script>
  </body>
</html>
