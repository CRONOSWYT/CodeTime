<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="refresh" content="0; url=CodeTime.html">
    <title>CodeTime - Redirigiendo...</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
        color: #00d4ff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        text-align: center;
      }
      .mensaje_redirección {
        padding: 2rem;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(0, 212, 255, 0.2);
        transition: transform 0.2s ease;
      }
      .mensaje_redirección:hover {
        transform: scale(1.05);
      }
      .circulo {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(0, 212, 255, 0.3);
        border-top: 3px solid #00d4ff;
        border-radius: 50%;
        animation: giro 1s linear infinite;
        margin: 0 auto 1rem;
      }
      @keyframes giro {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      a {
        color: #00d4ff;
        text-decoration: none;
        font-weight: 600;
      }
      a:hover {
        text-decoration: underline;
      }

      footer {
        position: fixed;
        bottom: 0;
        width: 100%;
      }
      .no:hover {
        cursor: not-allowed;
        color: rgba(0, 0, 0, 0.425);
      }
    </style>
  </head>
  <body>
    <div class="mensaje_redirección">
      <div class="circulo"></div>
      <h1>CodeTime</h1>
      <p>Redirigiendo a la página principal...</p>
      <p>
        <a href="CodeTime.html"
          >Si no eres redirigido automáticamente, haz clic aquí</a
        >
      </p>
    </div>

       <script>
        // Redirección inmediata por JavaScript como respaldo
        window.location.replace('CodeTime.html');
    </script> 

    <!-- Footer -->
    <footer>
      <div>
        <div>
          <a href="privacy-terms.html">Términos y Condiciones</a>
          <a href="privacy-terms.html">Política de Privacidad</a>
          <a href="#" class="no">Contacto</a>
          <a href="#" class="no">Acerca de</a>
        </div>
        <div>
          <p>
            &copy; 2026 CodeTime. Todos los derechos reservados. | Plataforma
            educativa de programación
          </p>
        </div>
      </div>
    </footer>
  </body>
</html>
