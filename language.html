async function getSession2() {
    // Primero intentar leer del localStorage
    const storedUser = localStorage.getItem('user');
    const storedSession = localStorage.getItem('session');

    if (storedUser && storedSession) {
        user2 = JSON.parse(storedUser);
    } else {
        // Si no hay en localStorage, verificar con Supabase
        const { data } = await supabase.auth.getSession();
        user2 = data?.session?.user || null;

        // Si Supabase tiene sesión, guardarla en localStorage
        if (user2) {
            localStorage.setItem('user', JSON.stringify(user2));
            localStorage.setItem('session', JSON.stringify(data.session));
        }
    }

    loginBtn2.style.display = user2 ? "none" : "block";
    logoutBtn2.style.display = user2 ? "block" : "none";
}

async function loadCards2() {
    let query = supabase.from("cards").select("*");
    if (currentLanguageId) {
        query = query.or(`language.eq.${currentLang},language_id.eq.${currentLanguageId}`);
    } else {
        query = query.eq("language", currentLang);
    }

    const { data, error } = await query
        .order("updated_at", { ascending: false, nullsFirst: false })
        .order("created_at", { ascending: false });

    if (error) {
        console.error(error);
      Swal.fire({
  icon: "error",
  title: "Error",
  text: "Error cargando tarjetas"
});
        return;
    }

    allCards2 = data || [];
    const userIds = [...new Set(allCards2.map(card => card.user_id).filter(Boolean))];
    if (userIds.length > 0) {
        const { data: perfiles, error: perfilesError } = await supabase
            .from('perfiles')
            .select('id, username')
            .in('id', userIds);

        if (perfilesError) {
            console.warn('No se pudo cargar los nombres de usuario:', perfilesError.message);
            usersMap = new Map();
        } else {
            usersMap = new Map((perfiles || []).map(p => [p.id, p.username]));
        }
    } else {
        usersMap = new Map();
    }

    const cardIds = [...new Set(allCards2.map(card => card.id).filter(Boolean))];
    await loadCardLikeData(cardIds);
    renderCards2(allCards2);
}

async function loadCardLikeData(cardIds) {
    cardLikes = new Map();
    userLikedCards = new Set();

    if (!cardIds.length) return;

    const { data: likeRows, error } = await supabase
        .from('likes_cards')
        .select('card_id, user_id')
        .in('card_id', cardIds);

    if (error) {
        console.warn('Error cargando likes de tarjetas:', error.message);
        return;
    }

    (likeRows || []).forEach((row) => {
        cardLikes.set(row.card_id, (cardLikes.get(row.card_id) || 0) + 1);
        if (user2 && row.user_id === user2.id) {
            userLikedCards.add(row.card_id);
        }
    });
}

function Markdown2(text = "") {
    return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/^### (.*?)$/gm, "<h3>$1</h3>")
        .replace(/^## (.*?)$/gm, "<h2>$1</h2>")
        .replace(/^# (.*?)$/gm, "<h1>$1</h1>")
        .replace(/```([\s\S]*?)```/g, "<pre><code>$1</code></pre>")
        .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
        .replace(/\*(.*?)\*/g, "<em>$1</em>")
        .replace(/__(.*?)__/g, "<u>$1</u>")
        .replace(/~~(.*?)~~/g, "<del>$1</del>")
        .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank">$1</a>')
        .replace(/^> (.*?)$/gm, "<blockquote>$1</blockquote>")
        .replace(/^- (.*?)$/gm, "<li>$1</li>")
        .replace(/(<li>.*?<\/li>)/gs, "<ul>$1</ul>")
        .replace(/\n/g, "<br>");
}

function renderCards2(cards) {
    const container = document.getElementById("contenedor_tarjetas");
    container.innerHTML = "";

    if (!cards.length) {
        container.innerHTML = "<p>No hay tarjetas</p>";
        return;
    }

    cards.sort((a, b) => {
        const aLikes = cardLikes.get(a.id) || 0;
        const bLikes = cardLikes.get(b.id) || 0;
        return bLikes - aLikes;
    });

    cards.forEach(doc => {
        const card = document.createElement("div");
        card.className = "tarjeta_etiqueta";
        const preview = (doc.descripcion || "").slice(0, 100);
        const hasMore = doc.descripcion && doc.descripcion.length > 100 ? "..." : "";
        const dateToShow = doc.updated_at ? new Date(doc.updated_at) : new Date(doc.created_at);
        const dateFormatted = dateToShow.toLocaleDateString() + " " + dateToShow.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const badge = doc.contenido ? "✓" : "∘";
        const likeCount = cardLikes.get(doc.id) || 0;
        const liked = userLikedCards.has(doc.id);

        card.innerHTML = `
            <div class="encabezado_tarjeta">
                <h3 class="tag_name">${doc.titulo}</h3>
                <span class="insignia_tarjeta">${badge}</span>
            </div>
            <p>${preview}${hasMore}</p>
            <div class="pie_tarjeta">
                <small>Por: ${usersMap.get(doc.user_id) || 'Desconocido'} | ${dateFormatted}</small>
            </div>
            <div class="acciones_tarjeta">
                <button class="btn boton_secundario boton_megusta_tarjeta" data-card-id="${doc.id}">${liked ? '<img src="icons/prueba 2 corazon fondo.svg" alt="" width="15px" height="15px">' : '🤍'} ${likeCount}</button>
                <button class="btn boton_secundario boton_reporte_tarjeta" data-card-id="${doc.id}" data-card-title="${doc.titulo}" ${doc.user_id ? `data-target-owner="${doc.user_id}"` : ''}>
                  <i class="fas fa-flag"></i>
                </button>
            </div>
        `;

        card.onclick = () => openCard2(doc);
        container.appendChild(card);

        const likeButton = card.querySelector('.boton_megusta_tarjeta');
        if (likeButton) {
            likeButton.onclick = (event) => {
                event.stopPropagation();
                toggleCardLike(doc.id);
            };
        }

        const reportButton = card.querySelector('.boton_reporte_tarjeta');
        if (reportButton) {
            reportButton.onclick = (event) => {
                event.stopPropagation();
                const targetOwnerId = reportButton.dataset.targetOwner || null;
                openReportModal2('card', doc.id, doc.titulo, targetOwnerId);
            };
        }
    });
}

async function openCard2(doc) {
    const createdDate = new Date(doc.created_at);
    const updatedDate = doc.updated_at ? new Date(doc.updated_at) : null;
    const metaInfo = updatedDate && updatedDate.getTime() !== createdDate.getTime()
        ? `<div style="font-size: 12px; color: var(--text-secondary); margin-top: 8px;">Creada: ${createdDate.toLocaleDateString()} ${createdDate.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}<br>Editada: ${updatedDate.toLocaleDateString()} ${updatedDate.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>`
        : `<div style="font-size: 12px; color: var(--text-secondary); margin-top: 8px;">Creada: ${createdDate.toLocaleDateString()} ${createdDate.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>`;

    await logAudit2('SELECT', 'cards', doc.id, `Tarjeta vista: ${doc.titulo}`);

    modalBody2.innerHTML = `
        <div class="modal_encabezado">
            <h2>${doc.titulo}</h2>
            ${metaInfo}
        </div>
        <div class="modal_cuerpo">
            <p class="descripcion_tarjeta">${doc.descripcion || "Sin descripción"}</p>
            <hr class="separador">
            <div class="caja_contenido">${Markdown2(doc.contenido || "Sin contenido")}</div>
            <div class="acciones_tarjeta">
                ${user2 && user2.id === doc.user_id ? `<button id="boton_editar_vista2" class="btn boton_primario"><i class="fas fa-edit"></i> Editar</button>` : ""}
                <button id="boton_reporte_vista2" class="btn boton_secundario"><i class="fas fa-flag"></i> Reportar</button>
                <button id="boton_copiar_vista2" class="btn boton_secundario"><i class="fas fa-copy"></i> Copiar</button>
                <button id="boton_cerrar_vista2" class="btn boton_secundario"><i class="fas fa-times"></i> Cerrar</button>
            </div>
        </div>
    `;

    modal2.style.display = "block";

    if (user2) {
        const editButton = document.getElementById("boton_editar_vista2");
        if (editButton) {
            editButton.onclick = async () => {
                await logAudit2('UPDATE', 'cards', doc.id, `Editor abierto para tarjeta: ${doc.titulo}`);
                modal2.style.display = "none";
                openEditor(doc);
            };
        }
    }

    const reportButton = document.getElementById("boton_reporte_vista2");
    if (reportButton) {
        reportButton.onclick = () => {
            modal2.style.display = "none";
            openReportModal2('card', doc.id, doc.titulo, doc.user_id || null);
        };
    }

    document.getElementById("boton_copiar_vista2").onclick = async () => {
        const text = `${doc.titulo}\n${doc.descripcion || ""}\n\n${doc.contenido || ""}`;
        try {
            await navigator.clipboard.writeText(text);
            await logAudit2('SELECT', 'cards', doc.id, `Contenido copiado de la tarjeta: ${doc.titulo}`);
            Swal.fire({
                toast: true,
                position: "top-end",
                icon: "success",
                title: "¡Contenido copiado!",
                showConfirmButton: false,
                timer: 2000,
                timerProgressBar: true
            });
        } catch (error) {
            console.error('Error copiando contenido:', error);
        }
    };

    document.getElementById("boton_cerrar_vista2").onclick = () => {
        modal2.style.display = "none";
    };
}

closeModal2.onclick = () => modal2.style.display = "none";
closeEditorModal2.onclick = () => editorModal2.style.display = "none";

const reportModal2 = document.getElementById('modal_reporte');
const closeReportModal2 = document.getElementById('cerrar_modal_reporte');
const cancelReportBtn2 = document.getElementById('boton_cancelar_reporte');
const submitReportBtn2 = document.getElementById('boton_enviar_reporte');

function openEditor(card = null) {
    currentEditingCard2 = card;
    editorTitle2.textContent = card ? "Editar Tarjeta" : "Nueva Tarjeta";
    cardTitle2.value = card?.titulo || "";
    cardDescription2.value = card?.descripcion || "";
    cardContent2.value = card?.contenido || "";
    deleteCardBtn2.style.display = card ? "block" : "none";
    updatePreview();
    editorModal2.style.display = "block";
    cardTitle2.focus();
}

function insertFormat(format) {
    const textarea = cardContent2;
    const start = textarea.selectionStart;
    const end = textarea.selectionEnd;
    const selected = textarea.value.substring(start, end) || "texto";
    let insertion = "";

    switch (format) {
        case "bold": insertion = `**${selected}**`; break;
        case "italic": insertion = `*${selected}*`; break;
        case "code": insertion = `\`\`\`\n${selected}\n\`\`\``; break;
        case "link": insertion = `[${selected}](https://ejemplo.com)`; break;
        case "heading": insertion = `# ${selected}`; break;
        case "list": insertion = `- ${selected}`; break;
        case "quote": insertion = `> ${selected}`; break;
        case "clear":
            if (confirm("¿Limpiar todo el contenido?")) {
                textarea.value = "";
                updatePreview();
            }
            return;
    }

    textarea.value = textarea.value.substring(0, start) + insertion + textarea.value.substring(end);
    updatePreview();
}

function updatePreview() {
    contentPreview2.innerHTML = Markdown2(cardContent2.value);
}

document.querySelectorAll(".boton_formato").forEach(btn => {
    btn.onclick = e => {
        e.preventDefault();
        insertFormat(btn.dataset.format);
    };
});

cardContent2.addEventListener("input", updatePreview);

if (!user2) {

    icon: "warning",

    text: "Debes iniciar sesión",
    confirmButtonText: "Entendido"
  });

saveCardBtn2.onclick = async () => {
    if (!cardTitle2.value.trim()) {
        return Swal.fire({
            icon: "warning",
            title: "Título obligatorio",
            text: "El título es obligatorio",
            confirmButtonText: "Entendido"
        });
    }

    try {
        if (currentEditingCard2) {
            const oldValues = {
                titulo: currentEditingCard2.titulo,
                descripcion: currentEditingCard2.descripcion,
                contenido: currentEditingCard2.contenido
            };
            const newValues = {
                titulo: cardTitle2.value.trim(),
                descripcion: cardDescription2.value.trim(),
                contenido: cardContent2.value
            };

            await supabase.from("cards").update({
                titulo: newValues.titulo,
                descripcion: newValues.descripcion,
                contenido: newValues.contenido,
                updated_at: new Date().toISOString()
            }).eq("id", currentEditingCard2.id).eq("user_id", user2.id);

            await logAudit2('UPDATE', 'cards', currentEditingCard2.id, `Tarjeta actualizada: ${newValues.titulo}`, oldValues, newValues);
        } else {
            const { data, error } = await supabase.from("cards").insert([{
                titulo: cardTitle2.value.trim(),
                descripcion: cardDescription2.value.trim(),
                contenido: cardContent2.value,
                language: currentLang,
                language_id: currentLanguageId,
                user_id: user2.id
            }]).select();

            if (error) {
                throw error;
            }

            if (data && data[0]?.id) {
                await logAudit2('INSERT', 'cards', data[0].id, `Tarjeta creada: ${cardTitle2.value.trim()}`, null, {
                    titulo: cardTitle2.value.trim(),
                    descripcion: cardDescription2.value.trim(),
                    contenido: cardContent2.value,
                    language: currentLang,
                    language_id: currentLanguageId
                });
            }
        }

        editorModal2.style.display = "none";
        currentEditingCard2 = null;
        loadCards2();
    } catch (error) {
        Swal.fire({
            icon: "error",
            title: "Error al guardar",
            text: error.message
        });
    }
};

deleteCardBtn2.onclick = async () => {
    if (!currentEditingCard2) return;
    if (!confirm("¿Eliminar esta tarjeta? No se puede deshacer.")) return;

    try {
        const { error } = await supabase.from("cards").delete().eq("id", currentEditingCard2.id).eq("user_id", user2.id);
        if (error) {
            throw error;
        }

        await logAudit2('DELETE', 'cards', currentEditingCard2.id, `Tarjeta eliminada: ${currentEditingCard2.titulo}`, {
            titulo: currentEditingCard2.titulo,
            descripcion: currentEditingCard2.descripcion,
            contenido: currentEditingCard2.contenido,
            language: currentEditingCard2.language,
            language_id: currentEditingCard2.language_id
        }, null);

        editorModal2.style.display = "none";
        currentEditingCard2 = null;
        loadCards2();
    } catch (error) {
        Swal.fire({
            icon: "error",
            title: "Error al eliminar",
            text: error.message
        });
    }
};

cancelCardBtn2.onclick = () => {
    editorModal2.style.display = "none";
    currentEditingCard2 = null;
};

window.onclick = event => {
    if (event.target === modal2) modal2.style.display = "none";

searchInput2.addEventListener("input", e => {
    const term = e.target.value.toLowerCase().trim();
    if (!term) return renderCards2(allCards2);

    const filtered = allCards2.filter(card =>
        (card.titulo || "").toLowerCase().includes(term) ||
        (card.descripcion || "").toLowerCase().includes(term) ||
        (card.contenido || "").toLowerCase().includes(term) ||
        (usersMap.get(card.user_id) || "").toLowerCase().includes(term)
    );

    renderCards2(filtered);
});

};

// Funcionalidad para ocultar/mostrar header al hacer scroll
        let lastScrollTop = 0;
        const header = document.querySelector('.header');
        
        window.addEventListener('scroll', function() {
            let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            
            if (scrollTop > lastScrollTop && scrollTop > 100) {
                // Scrolling down - hide header
                header.style.transform = 'translateY(-100%)';
                header.style.transition = 'transform 0.3s ease-in-out';
            } else {
                // Scrolling up - show header
                header.style.transform = 'translateY(0)';
                header.style.transition = 'transform 0.3s ease-in-out';
            }
            
            lastScrollTop = scrollTop;
        });
