<div id="editorModal" class="modal">
    <div class="modal-content editor-modal-content">
        <button class="modal-close" id="closeEditorModal">&times;</button>
        <div class="modal-header">
            <h2 id="editorTitle">Nueva Tarjeta</h2>
        </div>
        <div class="modal-body">
            <div class="editor-form">
                <div class="form-group">
                    <label for="cardTitle">Título:</label>
                    <input type="text" id="cardTitle" placeholder="Título de la tarjeta" maxlength="100">
                </div>

                <div class="form-group">
                    <label for="cardDescription">Descripción:</label>

                </div>

                <div class="form-group">
                    <label for="cardContent">Contenido (Formato Markdown):</label>
                    <div class="editor-toolbar">
                        <button type="button" class="format-btn" data-format="bold" title="Negrita: **texto**">
                            <i class="fas fa-bold"></i>
                        </button>
                        <button type="button" class="format-btn" data-format="italic" title="Itálica: *texto*">
                            <i class="fas fa-italic"></i>
                        </button>
                        <button type="button" class="format-btn" data-format="code" title="Código: ```código```">
                            <i class="fas fa-code"></i>
                        </button>
                        <button type="button" class="format-btn" data-format="link" title="Enlace: [texto](url)">
                            <i class="fas fa-link"></i>
                        </button>
                        <div class="separator"></div>
                        <button type="button" class="format-btn" data-format="heading" title="Encabezado: # Texto">
                            <i class="fas fa-heading"></i>
                        </button>
                        <button type="button" class="format-btn" data-format="list" title="Lista: - item">
                            <i class="fas fa-list"></i>
                        </button>
                        <button type="button" class="format-btn" data-format="quote" title="Cita: > texto">
                            <i class="fas fa-quote-left"></i>
                        </button>
                        <div class="separator"></div>
                        <button type="button" class="format-btn" data-format="clear" title="Limpiar todo">
                            <i class="fas fa-eraser"></i>
                        </button>
                    </div>
                    <textarea id="cardContent" placeholder="Puedes usar formato Markdown&#10;**negrita** | *itálica* | ```código``` | # Título" rows="10"></textarea>
                </div>

                <div class="editor-split">
                    <div class="editor-preview">

                        <div id="contentPreview" class="content-preview"></div>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" id="saveCardBtn" class="btn btn-primary">Guardar</button>
                    <button type="button" id="deleteCardBtn" class="btn btn-danger" style="display:none;">Eliminar</button>

</div>

let validLangs = [];

const logoutBtn2 = document.getElementById("logoutBtn");
const addCardBtn2 = document.getElementById("addCardBtn");

const closeEditorModal2 = document.getElementById("closeEditorModal");

let user2 = null;

let currentLanguageId = null;

let cardLikes = new Map();
let userLikedCards = new Set();

async function loadValidLangs() {
    const { data, error } = await supabase
        .from("languages")
        .select("name")
        .eq("is_active", true);

    if (error) {
        console.error("Error cargando lenguajes:", error);
        validLangs = ["general"]; // fallback
    } else {
        validLangs = data.map(l => l.name.toLowerCase());
        if (!validLangs.includes("general")) validLangs.push("general");
    }
}

loginBtn2.onclick = () => {
    window.location.href = 'login.html';
};

logoutBtn2.onclick = async () => {
    await supabase.auth.signOut();
    localStorage.removeItem('user');
    localStorage.removeItem('session');
    location.reload();
};

async function getSession2() {
    // Primero intentar leer del localStorage
    const storedUser = localStorage.getItem('user');
    const storedSession = localStorage.getItem('session');

    if (storedUser && storedSession) {
        user2 = JSON.parse(storedUser);
    } else {
        // Si no hay en localStorage, verificar con Supabase
        const { data } = await supabase.auth.getSession();
        user2 = data?.session?.user || null;

        // Si Supabase tiene sesión, guardarla en localStorage
        if (user2) {
            localStorage.setItem('user', JSON.stringify(user2));
            localStorage.setItem('session', JSON.stringify(data.session));
        }
    }

    loginBtn2.style.display = user2 ? "none" : "block";
    logoutBtn2.style.display = user2 ? "block" : "none";
}

async function loadCards2() {
    let query = supabase.from("cards").select("*");
    if (currentLanguageId) {
        query = query.or(`language.eq.${currentLang},language_id.eq.${currentLanguageId}`);
    } else {
        query = query.eq("language", currentLang);
    }

    const { data, error } = await query
        .order("updated_at", { ascending: false, nullsFirst: false })
        .order("created_at", { ascending: false });

    if (error) {
        console.error(error);
        alert("Error cargando tarjetas");
        return;
    }

    allCards2 = data || [];
    const userIds = [...new Set(allCards2.map(card => card.user_id).filter(Boolean))];
    if (userIds.length > 0) {
        const { data: perfiles, error: perfilesError } = await supabase
            .from('perfiles')
            .select('id, username')
            .in('id', userIds);

        if (perfilesError) {
            console.warn('No se pudo cargar los nombres de usuario:', perfilesError.message);
            usersMap = new Map();
        } else {
            usersMap = new Map((perfiles || []).map(p => [p.id, p.username]));
        }
    } else {
        usersMap = new Map();
    }

    const cardIds = [...new Set(allCards2.map(card => card.id).filter(Boolean))];
    await loadCardLikeData(cardIds);
    renderCards2(allCards2);
}

async function loadCurrentLanguage() {
    const { data, error } = await supabase
        .from('languages')
        .select('*')
        .eq('name', currentLang)
        .maybeSingle();

    if (error) {
        console.error('Error cargando el lenguaje actual:', error);
        return;
    }

    if (data) {
        currentLanguageRecord = data;
        currentLanguageId = data.id;
    } else {
        currentLanguageRecord = null;
        currentLanguageId = null;
    }
}

async function loadCardLikeData(cardIds) {
    cardLikes = new Map();
    userLikedCards = new Set();

    if (!cardIds.length) return;

    const { data: likeRows, error } = await supabase
        .from('likes_cards')
        .select('card_id, user_id')
        .in('card_id', cardIds);

    if (error) {
        console.warn('Error cargando likes de tarjetas:', error.message);
        return;
    }

    (likeRows || []).forEach((row) => {
        cardLikes.set(row.card_id, (cardLikes.get(row.card_id) || 0) + 1);
        if (user2 && row.user_id === user2.id) {
            userLikedCards.add(row.card_id);
        }
    });
}

async function toggleCardLike(cardId) {
    if (!user2) {
        return alert('Debes iniciar sesión para dar like');
    }

    const alreadyLiked = userLikedCards.has(cardId);
    if (alreadyLiked) {
        const { error } = await supabase
            .from('likes_cards')
            .delete()
            .match({ card_id: cardId, user_id: user2.id });
        if (error) return alert('Error quitando like: ' + error.message);
    } else {
        const { error } = await supabase
            .from('likes_cards')
            .insert({ card_id: cardId, user_id: user2.id });
        if (error) return alert('Error guardando like: ' + error.message);
    }

    await loadCardLikeData([...new Set(allCards2.map(card => card.id).filter(Boolean))]);
    renderCards2(allCards2);
}

function Markdown2(text = "") {
    return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/^### (.*?)$/gm, "<h3>$1</h3>")
        .replace(/^## (.*?)$/gm, "<h2>$1</h2>")
        .replace(/^# (.*?)$/gm, "<h1>$1</h1>")
        .replace(/```([\s\S]*?)```/g, "<pre><code>$1</code></pre>")
        .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
        .replace(/\*(.*?)\*/g, "<em>$1</em>")
        .replace(/__(.*?)__/g, "<u>$1</u>")
        .replace(/~~(.*?)~~/g, "<del>$1</del>")
        .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank">$1</a>')
        .replace(/^> (.*?)$/gm, "<blockquote>$1</blockquote>")
        .replace(/^- (.*?)$/gm, "<li>$1</li>")
        .replace(/(<li>.*?<\/li>)/gs, "<ul>$1</ul>")
        .replace(/\n/g, "<br>");
}

function renderCards2(cards) {
    const container = document.getElementById("cardsContainer");
    container.innerHTML = "";

    if (!cards.length) {
        container.innerHTML = "<p>No hay tarjetas</p>";
        return;
    }

    cards.forEach(doc => {
        const card = document.createElement("div");
        card.className = "tag-card";
        const preview = (doc.descripcion || "").slice(0, 100);
        const hasMore = doc.descripcion && doc.descripcion.length > 100 ? "..." : "";
        const dateToShow = doc.updated_at ? new Date(doc.updated_at) : new Date(doc.created_at);
        const dateFormatted = dateToShow.toLocaleDateString() + " " + dateToShow.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const badge = doc.contenido ? "✓" : "∘";
        const likeCount = cardLikes.get(doc.id) || 0;
        const liked = userLikedCards.has(doc.id);

        card.innerHTML = `
            <div class="card-header">
                <h3>${doc.titulo}</h3>
                <span class="card-badge">${badge}</span>
            </div>
            <p>${preview}${hasMore}</p>
            <div class="card-footer">
                <small>Por: ${usersMap.get(doc.user_id) || 'Desconocido'} | ${dateFormatted}</small>
            </div>
            <div class="card-actions">
                <button class="btn btn-like card-like-btn" data-card-id="${doc.id}">${liked ? '💖' : '🤍'} ${likeCount}</button>
                <button class="btn btn-secondary report-card-btn" data-card-id="${doc.id}" data-card-title="${doc.titulo}" ${doc.user_id ? `data-target-owner="${doc.user_id}"` : ''}>
                  <i class="fas fa-flag"></i>
                </button>
            </div>
        `;

        card.onclick = () => openCard2(doc);
        container.appendChild(card);

        const likeButton = card.querySelector('.card-like-btn');
        if (likeButton) {
            likeButton.onclick = (event) => {
                event.stopPropagation();
                toggleCardLike(doc.id);
            };
        }

        const reportButton = card.querySelector('.report-card-btn');
        if (reportButton) {
            reportButton.onclick = (event) => {
                event.stopPropagation();
                const targetOwnerId = reportButton.dataset.targetOwner || null;
                openReportModal2('card', doc.id, doc.titulo, targetOwnerId);
            };
        }
    });
}

function openCard2(doc) {
    const createdDate = new Date(doc.created_at);
    const updatedDate = doc.updated_at ? new Date(doc.updated_at) : null;
    const metaInfo = updatedDate && updatedDate.getTime() !== createdDate.getTime()
        ? `<div style="font-size: 12px; color: var(--text-secondary); margin-top: 8px;">Creada: ${createdDate.toLocaleDateString()} ${createdDate.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}<br>Editada: ${updatedDate.toLocaleDateString()} ${updatedDate.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>`
        : `<div style="font-size: 12px; color: var(--text-secondary); margin-top: 8px;">Creada: ${createdDate.toLocaleDateString()} ${createdDate.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>`;

    modalBody2.innerHTML = `
        <div class="modal-header">
            <h2>${doc.titulo}</h2>
            ${metaInfo}
        </div>
        <div class="modal-body">
            <p class="card-description">${doc.descripcion || "Sin descripción"}</p>
            <hr class="divider">
            <div class="content-box">${Markdown2(doc.contenido || "Sin contenido")}</div>
            <div class="card-actions">
                ${user2 && user2.id === doc.user_id ? `<button id="viewEditBtn2" class="btn btn-primary"><i class="fas fa-edit"></i> Editar</button>` : ""}
                <button id="viewReportBtn2" class="btn btn-secondary"><i class="fas fa-flag"></i> Reportar</button>
                <button id="viewCopyBtn2" class="btn btn-secondary"><i class="fas fa-copy"></i> Copiar</button>
                <button id="viewCloseBtn2" class="btn btn-secondary"><i class="fas fa-times"></i> Cerrar</button>
            </div>
        </div>
    `;

    modal2.style.display = "block";

    if (user2) {
        const editButton = document.getElementById("viewEditBtn2");
        if (editButton) {
            editButton.onclick = () => {
                modal2.style.display = "none";
                openEditor(doc);
            };
        }
    }

    const reportButton = document.getElementById("viewReportBtn2");
    if (reportButton) {
        reportButton.onclick = () => {
            modal2.style.display = "none";
            openReportModal2('card', doc.id, doc.titulo, doc.user_id || null);
        };
    }

    document.getElementById("viewCopyBtn2").onclick = () => {
        const text = `${doc.titulo}\n${doc.descripcion || ""}\n\n${doc.contenido || ""}`;
        navigator.clipboard.writeText(text).then(() => alert("Contenido copiado!"));
    };

    document.getElementById("viewCloseBtn2").onclick = () => {
        modal2.style.display = "none";
    };
}

function openEditor(card = null) {
    currentEditingCard2 = card;
    editorTitle2.textContent = card ? "Editar Tarjeta" : "Nueva Tarjeta";
    cardTitle2.value = card?.titulo || "";
    cardDescription2.value = card?.descripcion || "";
    cardContent2.value = card?.contenido || "";
    deleteCardBtn2.style.display = card ? "block" : "none";
    updatePreview();
    editorModal2.style.display = "block";
    cardTitle2.focus();
}

function insertFormat(format) {
    const textarea = cardContent2;
    const start = textarea.selectionStart;
    const end = textarea.selectionEnd;
    const selected = textarea.value.substring(start, end) || "texto";
    let insertion = "";

    switch (format) {
        case "bold": insertion = `**${selected}**`; break;
        case "italic": insertion = `*${selected}*`; break;
        case "code": insertion = `\`\`\`\n${selected}\n\`\`\``; break;
        case "link": insertion = `[${selected}](https://ejemplo.com)`; break;
        case "heading": insertion = `# ${selected}`; break;
        case "list": insertion = `- ${selected}`; break;
        case "quote": insertion = `> ${selected}`; break;
        case "clear":
            if (confirm("¿Limpiar todo el contenido?")) {
                textarea.value = "";
                updatePreview();
            }
            return;
    }

    textarea.value = textarea.value.substring(0, start) + insertion + textarea.value.substring(end);
    updatePreview();
}

function updatePreview() {
    contentPreview2.innerHTML = Markdown2(cardContent2.value);
}

document.querySelectorAll(".format-btn").forEach(btn => {
    btn.onclick = e => {
        e.preventDefault();
        insertFormat(btn.dataset.format);
    };
});

cardContent2.addEventListener("input", updatePreview);

addCardBtn2.onclick = () => {
    if (!user2) return alert("Debes iniciar sesión");
    openEditor();
};

saveCardBtn2.onclick = async () => {
    if (!cardTitle2.value.trim()) return alert("El título es obligatorio");

    try {
        if (currentEditingCard2) {
            await supabase.from("cards").update({
                titulo: cardTitle2.value,
                descripcion: cardDescription2.value,
                contenido: cardContent2.value,
                updated_at: new Date().toISOString()
            }).eq("id", currentEditingCard2.id).eq("user_id", user2.id);
        } else {
            await supabase.from("cards").insert([{
                titulo: cardTitle2.value,
                descripcion: cardDescription2.value,
                contenido: cardContent2.value,
                language: currentLang,
                language_id: currentLanguageId,
                user_id: user2.id
            }]);
        }

        editorModal2.style.display = "none";
        loadCards2();
    } catch (error) {
        alert("Error al guardar: " + error.message);
    }
};

deleteCardBtn2.onclick = async () => {
    if (!currentEditingCard2) return;
    if (!confirm("¿Eliminar esta tarjeta? No se puede deshacer.")) return;

    try {
        await supabase.from("cards").delete().eq("id", currentEditingCard2.id).eq("user_id", user2.id);
        editorModal2.style.display = "none";
        loadCards2();
    } catch (error) {
        alert("Error al eliminar: " + error.message);
    }
};

cancelCardBtn2.onclick = () => {
    editorModal2.style.display = "none";
    currentEditingCard2 = null;
};

    if (event.target === modal2) modal2.style.display = "none";
    if (event.target === editorModal2) {
        editorModal2.style.display = "none";
        currentEditingCard2 = null;
    }
};

searchInput2.addEventListener("input", e => {
    const term = e.target.value.toLowerCase().trim();
    if (!term) return renderCards2(allCards2);

    const filtered = allCards2.filter(card =>
        (card.titulo || "").toLowerCase().includes(term) ||
        (card.descripcion || "").toLowerCase().includes(term) ||
        (card.contenido || "").toLowerCase().includes(term) ||
        (usersMap.get(card.user_id) || "").toLowerCase().includes(term)
    );

    renderCards2(filtered);
});

clearSearch2.onclick = () => {
    searchInput2.value = "";
    renderCards2(allCards2);
};

    getSession2().then(loadValidLangs).then(loadCurrentLanguage).then(() => {
    if (!validLangs.includes(currentLang.toLowerCase())) {
        currentLang = "general";
    }
    document.getElementById("langTitle").textContent = currentLang.toUpperCase();
    document.getElementById("langSubtitle").textContent = `Tarjetas de ${currentLang}`;
    loadCards2();
});
</script>
