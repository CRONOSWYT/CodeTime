<main class="content">

<!-- MODAL VER TARJETA -->

    </div>

<!-- MODAL EDITOR TARJETA -->
<div id="editorModal" class="modal">
    <div class="modal-content editor-modal-content">
        <button class="modal-close" id="closeEditorModal">&times;</button>
        <div class="modal-header">
            <h2 id="editorTitle">Nueva Tarjeta</h2>
        </div>
        <div class="modal-body">
            <div class="editor-form">
                <div class="form-group">
                    <label for="cardTitle">Título:</label>
                    <input type="text" id="cardTitle" placeholder="Título de la tarjeta" maxlength="100">
                </div>

                <div class="form-group">
                    <label for="cardDescription">Descripción:</label>
                    <textarea id="cardDescription" placeholder="Descripción breve" maxlength="200" rows="2"></textarea>
                </div>

                <div class="form-group">
                    <label for="cardContent">Contenido (Formato Markdown):</label>
                    <div class="editor-toolbar">
                        <button type="button" class="format-btn" data-format="bold" title="Negrita: **texto**">
                            <i class="fas fa-bold"></i>
                        </button>
                        <button type="button" class="format-btn" data-format="italic" title="Itálica: *texto*">
                            <i class="fas fa-italic"></i>
                        </button>
                        <button type="button" class="format-btn" data-format="code" title="Código: ```código```">
                            <i class="fas fa-code"></i>
                        </button>
                        <button type="button" class="format-btn" data-format="link" title="Enlace: [texto](url)">
                            <i class="fas fa-link"></i>
                        </button>
                        <div class="separator"></div>
                        <button type="button" class="format-btn" data-format="heading" title="Encabezado: # Texto">
                            <i class="fas fa-heading"></i>
                        </button>
                        <button type="button" class="format-btn" data-format="list" title="Lista: - item">
                            <i class="fas fa-list"></i>
                        </button>
                        <button type="button" class="format-btn" data-format="quote" title="Cita: > texto">
                            <i class="fas fa-quote-left"></i>
                        </button>
                        <div class="separator"></div>
                        <button type="button" class="format-btn" data-format="clear" title="Limpiar todo">
                            <i class="fas fa-eraser"></i>
                        </button>
                    </div>
                    <textarea id="cardContent" placeholder="Puedes usar formato Markdown&#10;**negrita** | *itálica* | ```código``` | # Título" rows="10"></textarea>
                </div>

                <div class="editor-split">
                    <div class="editor-preview">

                        <div id="contentPreview" class="content-preview"></div>
                    </div>
                </div>

                <div class="form-actions">

                    <button type="button" id="deleteCardBtn" class="btn btn-danger" style="display:none;">Eliminar</button>

</div>

<script type="module">

/* Convierte texto estilo markdown a HTML */
function Markdown(text = "") {
    return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/^### (.*?)$/gm, "<h3>$1</h3>")
        .replace(/^## (.*?)$/gm, "<h2>$1</h2>")
        .replace(/^# (.*?)$/gm, "<h1>$1</h1>")
        .replace(/```([\s\S]*?)```/g, "<pre><code>$1</code></pre>")
        .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
        .replace(/\*(.*?)\*/g, "<em>$1</em>")
        .replace(/__(.*?)__/g, "<u>$1</u>")
        .replace(/~~(.*?)~~/g, "<del>$1</del>")
        .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank">$1</a>')
        .replace(/^> (.*?)$/gm, "<blockquote>$1</blockquote>")
        .replace(/^- (.*?)$/gm, "<li>$1</li>")
        .replace(/(<li>.*?<\/li>)/s, "<ul>$1</ul>")
        .replace(/\n/g, "<br>");
}


const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const addCardBtn = document.getElementById("addCardBtn");
const modal = document.getElementById("modal");
const closeModal = document.getElementById("closeModal");
const editorModal = document.getElementById("editorModal");
const closeEditorModal = document.getElementById("closeEditorModal");
const cardTitle = document.getElementById("cardTitle");
const cardDescription = document.getElementById("cardDescription");
const cardContent = document.getElementById("cardContent");
const saveCardBtn = document.getElementById("saveCardBtn");
const deleteCardBtn = document.getElementById("deleteCardBtn");
const cancelCardBtn = document.getElementById("cancelCardBtn");
const contentPreview = document.getElementById("contentPreview");

loginBtn.onclick = async () => { /* Al hacer clic en login */
    await supabase.auth.signInWithOAuth({
        provider: "google", /* Usa Google como proveedor */
        options: { redirectTo: window.location.href } /* Redirige a la misma página después del login */

};


logoutBtn.onclick = async () => {
    await supabase.auth.signOut(); /* Cierra sesión */

};


async function getSession() {
    const { data } = await supabase.auth.getSession();  /* Obtiene la sesión actual */
    user = data?.session?.user || null; /* Guarda usuario si existe */
    updateUI(); /* Actualiza botones */
}

function updateUI(){
    loginBtn.style.display = user ? "none" : "block";  /* Si hay usuario oculta login */
    logoutBtn.style.display = user ? "block" : "none";   /* Si hay usuario muestra logout */
}

async function loadCards(){
    const { data } = await supabase
        .from("html")
        .select("*")
        .order("updated_at", { ascending: false, nullsFirst: false }) /* Ordena por edición */
        .order("created_at", { ascending: false });  /* Luego por creación */

    allCards = data || []; /* Guarda tarjetas */
    renderCards(allCards); /* Renderiza tarjetas */
    searchInput.value = "";  /* Limpia búsqueda */
    searchSuggestions.innerHTML = ""; /* Limpia sugerencias */
}

function insertFormat(format) {  /* Función para insertar formato markdown en el textarea */
    const textarea = cardContent;  /* Referencia al textarea donde se escribe el contenido */
    const start = textarea.selectionStart; /* Posición inicial del texto seleccionado */
    const end = textarea.selectionEnd; /* Posición final del texto seleccionado */
    const selected = textarea.value.substring(start, end) || "texto"; /* Obtiene el texto seleccionado, si no hay usa "texto" */
    let insertion = ""; /* Variable donde se guardará el formato a insertar */

    switch(format) {
        case "bold":
            insertion = `**${selected}**`;
            break;
        case "italic":
            insertion = `*${selected}*`;
            break;
        case "code":
            insertion = `\`\`\`\n${selected}\n\`\`\``;
            break;
        case "link":
            insertion = `[${selected}](https://ejemplo.com)`;
            break;
        case "heading":
            insertion = `# ${selected}`;
            break;
        case "list":
            insertion = `- ${selected}`;
            break;
        case "quote":
            insertion = `> ${selected}`;
            break;
        case "clear":
            if (confirm("¿Limpiar todo el contenido?")) {
                cardContent.value = "";
                updatePreview();
            }
            return;
    }

    if (insertion) { /* Si hay contenido a insertar */
        cardContent.value = cardContent.value.substring(0, start) + insertion + cardContent.value.substring(end);
        updatePreview(); /* Reemplaza selección por el texto formateado */
    }
}

function updatePreview() {  /* Actualiza la vista previa del contenido */
    contentPreview.innerHTML = Markdown(cardContent.value); /* Convierte markdown a HTML y lo muestra */
}

document.querySelectorAll(".format-btn").forEach(btn => {  /* Recorre todos los botones de formato */
    btn.onclick = (e) => {  /* Evento click en cada botón */
        e.preventDefault();  /* Evita comportamiento por defecto */
        insertFormat(btn.dataset.format); /* Inserta el formato según atributo data-format */
    };
});

cardContent.addEventListener("input", updatePreview); /* Cada vez que cambia el contenido actualiza la vista previa */

addCardBtn.onclick = () => { /* Al hacer clic en agregar tarjeta */
    if(!user) return alert("Debes iniciar sesión"); /* Si no hay usuario, muestra alerta */
    openEditor(); /* Abre el editor */
};

function openEditor(card = null) { /* Abre el editor, vacío o con tarjeta existente */
    currentEditingCard = card;  /* Guarda la tarjeta actual */
    
    editorTitle.textContent = card ? "Editar Tarjeta" : "Nueva Tarjeta";
    cardTitle.value = card?.titulo || "";
    cardDescription.value = card?.descripcion || "";
    cardContent.value = card?.contenido || "";
    deleteCardBtn.style.display = card ? "block" : "none"; /* Muestra botón eliminar si está editando */
    
    updatePreview();
    editorModal.style.display = "block";
    cardTitle.focus();
}

saveCardBtn.onclick = async () => { /* Al hacer clic en guardar */
    if (!cardTitle.value.trim()) {
        return alert("El título es obligatorio");
    }

    try {
        if (currentEditingCard) {  /* Si existe tarjeta, actualizar */
            // UPDATE - Actualizar con timestamp de edición
            await supabase
                .from("html")
                .update({
                    titulo: cardTitle.value,
                    descripcion: cardDescription.value,
                    contenido: cardContent.value,
                    updated_at: new Date().toISOString()
                })
                .eq("id", currentEditingCard.id); /* Busca tarjeta por id */
        } else {
            await supabase.from("html").insert([{ /* Si no existe, crear nueva */
                titulo: cardTitle.value,
                descripcion: cardDescription.value,
                contenido: cardContent.value,
                user_id: user.id
                /* Asocia tarjeta al usuario */
            }]);
        }

        editorModal.style.display = "none";
        loadCards();
    } catch (error) {
        alert("Error al guardar: " + error.message);
    }
};

deleteCardBtn.onclick = async () => { // Cuando se hace clic en el botón eliminar
    if (!confirm("¿Eliminar esta tarjeta? No se puede deshacer.")) return;

    try {
        await supabase
            .from("html")
            .delete()
            .eq("id", currentEditingCard.id);

        editorModal.style.display = "none";
        loadCards();
    } catch (error) {
        alert("Error al eliminar: " + error.message);
    }
};

cancelCardBtn.onclick = () => {
    editorModal.style.display = "none";
    currentEditingCard = null;
};

function openCard(doc){ // Función para abrir una tarjeta en el modal
    const modalBody = document.getElementById("modalBody"); // Selecciona el cuerpo del modal
    
    const createdDate = new Date(doc.created_at); // Convierte la fecha de creación a objeto Date
    const updatedDate = doc.updated_at ? new Date(doc.updated_at) : null; // Convierte la fecha de actualización si existe
    const isEdited = updatedDate && updatedDate.getTime() !== createdDate.getTime(); // Verifica si fue editada
    
     // Formatea la fecha de creación
    const createdFormatted = createdDate.toLocaleDateString() + " " + createdDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
      // Formatea la fecha de edición
    const updatedFormatted = updatedDate ? updatedDate.toLocaleDateString() + " " + updatedDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "";
    
    const metaInfo = isEdited  // Crea la información de fechas para mostrar
        ? `<div style="font-size: 12px; color: var(--text-secondary); margin-top: 8px;">Creada: ${createdFormatted}<br>Editada: ${updatedFormatted}</div>`
        : `<div style="font-size: 12px; color: var(--text-secondary); margin-top: 8px;">Creada: ${createdFormatted}</div>`;
    
        // Inserta el contenido HTML en el modal
    modalBody.innerHTML = ` 
        <div class="modal-header">
            <h2>${doc.titulo}</h2>
            ${metaInfo}
        </div>
        <div class="modal-body">
            <p class="card-description">${doc.descripcion || "Sin descripción"}</p>
            <hr class="divider">
            <div class="content-box">
                ${Markdown(doc.contenido || "Sin contenido")}
            </div>
            <div class="card-actions">
                ${user ? `
    <button id="viewEditBtn" class="btn btn-primary">
        <i class="fas fa-edit"></i> Editar
    </button>
` : ""}
                <button id="viewCopyBtn" class="btn btn-secondary">
                    <i class="fas fa-copy"></i> Copiar
                </button>
                <button id="viewCloseBtn" class="btn btn-secondary">
                    <i class="fas fa-times"></i> Cerrar
                </button>
            </div>
        </div>
    `;

    modal.style.display = "block";

    if(user){
    document.getElementById("viewEditBtn").onclick = () => {
        modal.style.display = "none";
        openEditor(doc);
    };
}

    document.getElementById("viewCopyBtn").onclick = () => { // Asigna acción al botón copiar
        // Une título, descripción y contenido en un texto
        const text = `${doc.titulo}\n${doc.descripcion}\n\n${doc.contenido}`;
        // Copia el texto al portapapeles
        navigator.clipboard.writeText(text).then(() => {
            alert("¡Contenido copiado!");
        });
    };

    document.getElementById("viewCloseBtn").onclick = () => {
        modal.style.display = "none";
    };
}

closeModal.onclick = () => {
    modal.style.display = "none";
};

closeEditorModal.onclick = () => {
    editorModal.style.display = "none";
    currentEditingCard = null;

window.onclick = (event) => { // Detecta clics en cualquier parte de la ventana
    if (event.target === modal) modal.style.display = "none";
    if (event.target === editorModal) {
        editorModal.style.display = "none";
        currentEditingCard = null;
    }
};

let allCards = []; // Variable para guardar todas las tarjetas cargadas

const searchInput = document.getElementById("searchInput");
const clearSearchBtn = document.getElementById("clearSearch");
const searchSuggestions = document.getElementById("searchSuggestions");

function renderCards(cardsToShow){ // Función que dibuja las tarjetas en pantalla
    const container = document.getElementById("cardsContainer"); // Selecciona el contenedor de tarjetas
    container.innerHTML = "";

    if (!cardsToShow || cardsToShow.length === 0) { // Si no hay tarjetas
        container.innerHTML = '<p class="empty-state">No hay tarjetas. ¡Crea la primera!</p>';
        // Muestra mensaje vacío
        return;
    }

    cardsToShow.forEach(doc => {  // Recorre todas las tarjetas
        const card = document.createElement("div");
        card.className = "tag-card"; // Le asigna clase CSS

        const preview = (doc.descripcion || "").slice(0, 100); // Toma una vista previa de la descripción (100 caracteres)
        const hasMore = doc.descripcion && doc.descripcion.length > 100 ? "..." : ""; // Si la descripción supera 100 caracteres agrega puntos
        
        // Usa fecha de edición o creación
        const dateToShow = doc.updated_at ? new Date(doc.updated_at) : new Date(doc.created_at);
         // Verifica si la tarjeta fue editada
        const isEdited = doc.updated_at && new Date(doc.updated_at).getTime() !== new Date(doc.created_at).getTime();
        // Texto para indicar si fue creada o editada
        const dateLabel = isEdited ? "Editada" : "Creada";
        // Formatea la fecha para mostrar
        const dateFormatted = dateToShow.toLocaleDateString() + " " + dateToShow.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        
        card.innerHTML = `
            <div class="card-header">
                <h3>${doc.titulo}</h3>
                <span class="card-badge">${doc.contenido ? "✓" : "∘"}</span>
            </div>
            <p>${preview}${hasMore}</p>
            <div class="card-footer">
                <small>${dateLabel}: ${dateFormatted}</small>
            </div>
        `;

        card.onclick = () => openCard(doc); // Al hacer clic abre la tarjeta
        container.appendChild(card); // Agrega la tarjeta al contenedor
    });
}

// Función de búsqueda
function performSearch(searchTerm) {
    const term = searchTerm.toLowerCase().trim();  // Convierte el texto a minúsculas y quita espacios
    
    if (!term) {
        renderCards(allCards);
        searchSuggestions.innerHTML = "";
        clearSearchBtn.classList.remove("show");
        return;
    }

    // Mostrar botón de limpiar
    clearSearchBtn.classList.add("show");

    const filtered = allCards.filter(card => {  // Filtra tarjetas por título, descripción o contenido
        const title = (card.titulo || "").toLowerCase();
        const description = (card.descripcion || "").toLowerCase();
        const content = (card.contenido || "").toLowerCase();

        return title.includes(term) || description.includes(term) || content.includes(term);
    });

    renderCards(filtered);
}

searchInput.addEventListener("input", (e) => { // Detecta cuando el usuario escribe en el buscador
    performSearch(e.target.value); // Ejecuta la búsqueda con el texto ingresado
});

clearSearchBtn.onclick = () => {
    searchInput.value = "";
    searchSuggestions.innerHTML = "";
    searchSuggestions.classList.remove("show");
    clearSearchBtn.classList.remove("show");
    renderCards(allCards);
};

 // Funcionalidad para ocultar/mostrar header al hacer scroll
      let lastScrollTop = 0; // Guarda la última posición vertical del scroll
      const header = document.querySelector(".header"); // Selecciona el elemento del encabezado

      window.addEventListener("scroll", function () { // Detecta cada vez que el usuario hace scroll
        let scrollTop =
          window.pageYOffset || document.documentElement.scrollTop;  // Obtiene la posición actual del scroll vertical

        if (scrollTop > lastScrollTop && scrollTop > 100) { // Si el usuario baja y ya pasó 100px
         
          header.style.transform = "translateY(-100%)"; // Oculta el header moviéndolo hacia arriba
          header.style.transition = "transform 0.3s ease-in-out";
        } else {
          header.style.transform = "translateY(0)"; // Si el usuario sube, vuelve a mostrar el header
          header.style.transition = "transform 0.3s ease-in-out";
        }
// Actualiza la posición anterior del scroll
        lastScrollTop = scrollTop;
      });
getSession().then(loadCards); // Obtiene la sesión del usuario y luego carga las tarjetas

</script>
