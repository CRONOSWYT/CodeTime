<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - World Time</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="styles/general.css">
<style>
:root {
  --fd_dos: #1a1f2e;
  --fd_tres: #252b3d;
  --fd_acento: #2d3548;

  --az_electri: #00d4ff;
  --az_electri_lm: #33ddff;
  --az_electri_lmm: rgba(0, 212, 255, 0.3);

  --text_uno: #ffffff;
  --text_dos: #b8c5d6;
  --text_apa: #8a9bb0;

  --brd_color: #3a4556;

  --sbra_lg: rgba(0, 212, 255, 0.1);
  --sbra_md: rgba(0, 212, 255, 0.2);
  --sbra_psd: rgba(0, 212, 255, 0.3);

  --trasi: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);

  --bdr_rdo: 12px;
  --bdr_rdo_pqñ: 8px;
  --spciad_xs: 0.5rem;
  --spciad_sm: 1rem;
  --spciad_md: 1.5rem;
  --spciad_lg: 2rem;
  --spciad_xl: 3rem;

  --tarj_fd: var(--fd_dos);
  --sbr_tarj: 0 4px 20px var(--sbra_lg);
  --sbr_tarj_hover: 0 10px 30px var(--sbra_md);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:"Segoe UI";
  background: linear-gradient(135deg,var(--pincipal_fondo),var(--fd_dos));
  color:var(--text_uno);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.login-card{
  width:100%;
  max-width:400px;
  background:var(--tarj_fd);
  border:1px solid var(--brd_color);
  border-radius:var(--bdr_rdo);
  padding:var(--spciad_lg);
  box-shadow:var(--sbr_tarj);
}

.login-title{
  text-align:center;
  margin-bottom:var(--spciad_md);
  font-size:1.8rem;
  background:linear-gradient(45deg,var(--az_electri),var(--az_electri_lm));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.form-group{
  margin-bottom:var(--spciad_md);
  display:flex;
  flex-direction:column;
  gap:var(--spciad_xs);
}

.form-group label{
  color:var(--az_electri);
  font-weight:600;
}

.form-group input{
  background:var(--fd_tres);
  border:2px solid var(--brd_color);
  padding:var(--spciad_sm);
  border-radius:var(--bdr_rdo_pqñ);
  color:var(--text_uno);
}

.form-group input:focus{
  border-color:var(--az_electri);
  outline:none;
}

.btn-login{
  width:100%;
  padding:var(--spciad_sm);
  border:none;
  border-radius:var(--bdr_rdo_pqñ);
  font-weight:600;
  cursor:pointer;
  background:linear-gradient(135deg,var(--az_electri),var(--az_electri_lm));
  color:var(--pincipal_fondo);
  transition: var(--trasi);
}

.btn-login:hover {
  opacity: 0.9;
}

.btn-login:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.divider{
  text-align:center;
  margin:var(--spciad_md) 0;
  color:var(--text_apa);
}

.social-login{
  display:flex;
  flex-direction:column;
  gap:var(--spciad_sm);
}

.social-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:var(--spciad_sm);
  padding:var(--spciad_sm);
  border-radius:var(--bdr_rdo_pqñ);
  border:1px solid var(--brd_color);
  background:var(--fd_acento);
  color:var(--text_uno);
  cursor:pointer;
  transition: var(--trasi);
}

.social-btn:hover {
  border-color: var(--az_electri);
  background: var(--fd_dos);
}

.footer-text{
  margin-top:var(--spciad_md);
  text-align:center;
  color:var(--text_apa);
}

.error-msg {
  color: #ff6b6b;
  font-size: 0.9rem;
  margin-top: 0.5rem;
  display: none;
}

.success-msg {
  color: #51cf66;
  font-size: 0.9rem;
  margin-top: 0.5rem;
  display: none;
}

</style>
</head>
<body>

<div class="login-card">
  <h2 class="login-title">Iniciar Sesión</h2>

  <form id="authForm">
    <div class="form-group">
      <label>Correo</label>
      <input type="email" id="email" required>
      <div class="error-msg" id="emailError"></div>
    </div>

    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="password" required>
      <div class="error-msg" id="passwordError"></div>
    </div>

    <div id="messageError" class="error-msg"></div>
    <div id="messageSuccess" class="success-msg"></div>

    <button type="submit" class="btn-login" id="submitBtn">Iniciar Sesión</button>
  </form>

  <div class="divider">o continuar con</div>

  <div class="social-login">
    <button type="button" class="social-btn" id="googleBtn">
      <i class="fab fa-google"></i> Google
    </button>

    <button type="button" class="social-btn" id="githubBtn">
      <i class="fab fa-github"></i> GitHub
    </button>
  </div>

  <div class="footer-text">
    <p><a href="index.html" style="color: var(--az_electri); text-decoration: none;">Volver al inicio</a></p>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabaseClient = window.supabase.createClient(
  "https://ttmrvogucsmujegurmvi.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0bXJ2b2d1Y3NtdWplZ3VybXZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MDE2OTIsImV4cCI6MjA5Mjk3NzY5Mn0.8NrHzYYIXrTYOpdLJafAemXnZ8bJ1DhVwSU7hQx_3pQ"
);

const email = document.getElementById('email');
const password = document.getElementById('password');
const authForm = document.getElementById('authForm');
const submitBtn = document.getElementById('submitBtn');
const messageError = document.getElementById('messageError');
const messageSuccess = document.getElementById('messageSuccess');
const googleBtn = document.getElementById('googleBtn');
const githubBtn = document.getElementById('githubBtn');

// Verificar si ya está logueado
async function checkUserSession() {
  const { data } = await supabaseClient.auth.getSession();
  if (data?.session?.user) {
    // Guardar en localStorage
    localStorage.setItem('user', JSON.stringify(data.session.user));
    localStorage.setItem('session', JSON.stringify(data.session));
    window.location.href = 'index.html';
  }
}

checkUserSession();

// Limpiar mensajes
function clearMessages() {
  messageError.style.display = 'none';
  messageSuccess.style.display = 'none';
}

// Mostrar error
function showError(msg) {
  messageError.textContent = msg;
  messageError.style.display = 'block';
}

// Mostrar éxito
function showSuccess(msg) {
  messageSuccess.textContent = msg;
  messageSuccess.style.display = 'block';
}

// Guardar usuario en localStorage
function saveUserToStorage(user, session) {
  localStorage.setItem('user', JSON.stringify(user));
  localStorage.setItem('session', JSON.stringify(session));
}

// Manejar formulario de email/contraseña
authForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  clearMessages();

  const emailVal = email.value.trim();
  const passwordVal = password.value;

  if (!emailVal || !passwordVal) {
    showError('Por favor completa todos los campos');
    return;
  }

  if (passwordVal.length < 6) {
    showError('La contraseña debe tener al menos 6 caracteres');
    return;
  }

  submitBtn.disabled = true;

  try {
    // Intentar iniciar sesión
    const { data: signInData, error: signInError } = await supabaseClient.auth.signInWithPassword({
      email: emailVal,
      password: passwordVal
    });

    if (signInError) {
      // Si no existe, crear la cuenta
      if (signInError.message.includes('Invalid login credentials')) {
        const { data: signUpData, error: signUpError } = await supabaseClient.auth.signUp({
          email: emailVal,
          password: passwordVal
        });

        if (signUpError) {
          showError(signUpError.message || 'Error al crear la cuenta');
          submitBtn.disabled = false;
          return;
        }

        // Cuenta creada exitosamente
        showSuccess('¡Cuenta creada! Revisa tu email para confirmar y luego inicia sesión.');
        submitBtn.disabled = false;
        // Limpiar el formulario
        authForm.reset();
      } else {
        showError(signInError.message || 'Error al iniciar sesión');
        submitBtn.disabled = false;
      }
    } else {
      // Sesión iniciada
      showSuccess('¡Sesión iniciada! Redirigiendo...');
      saveUserToStorage(signInData.user, signInData.session);
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1000);
    }
  } catch (err) {
    showError('Ocurrió un error: ' + err.message);
    submitBtn.disabled = false;
  }
});

// Google OAuth
googleBtn.addEventListener('click', async (e) => {
  e.preventDefault();
  try {
    const { error } = await supabaseClient.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: window.location.origin + '/index.html'
      }
    });

    if (error) {
      showError('Error al conectar con Google: ' + error.message);
    }
  } catch (err) {
    showError('Error: ' + err.message);
  }
});

// GitHub OAuth
githubBtn.addEventListener('click', async (e) => {
  e.preventDefault();
  try {
    const { error } = await supabaseClient.auth.signInWithOAuth({
      provider: 'github',
      options: {
        redirectTo: window.location.origin + '/index.html'
      }
    });

    if (error) {
      showError('Error al conectar con GitHub: ' + error.message);
    }
  } catch (err) {
    showError('Error: ' + err.message);
  }
});

// Manejar callbacks de OAuth
window.addEventListener('load', async () => {
  const { data, error } = await supabaseClient.auth.getSession();
  if (data?.session?.user && !window.location.hash.includes('#')) {
    saveUserToStorage(data.session.user, data.session);
  }
});
</script>

</body>
</html>
