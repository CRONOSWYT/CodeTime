<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Login - World Time</title>

    <link rel="icon" href="icons/logo.ico" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <link rel="stylesheet" href="styles/general.css" />

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- SWEALERT2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
      :root {
        --fd_dos: #1a1f2e;
        --fd_tres: #252b3d;
        --fd_acento: #2d3548;
        --az_electri: #00d4ff;
        --az_electri_lm: #33ddff;
        --az_electri_lmm: rgba(0, 212, 255, 0.3);
        --text_uno: #ffffff;
        --text_dos: #b8c5d6;
        --text_apa: #8a9bb0;
        --brd_color: #3a4556;
        --sbra_lg: rgba(0, 212, 255, 0.1);
        --sbra_md: rgba(0, 212, 255, 0.2);
        --sbra_psd: rgba(0, 212, 255, 0.3);
        --trasi: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        --bdr_rdo: 12px;
        --bdr_rdo_pqñ: 8px;
        --spciad_xs: 0.5rem;
        --spciad_sm: 1rem;
        --spciad_md: 1.5rem;
        --spciad_lg: 2rem;
        --spciad_xl: 3rem;
        --tarj_fd: var(--fd_dos);
        --sbr_tarj: 0 4px 20px var(--sbra_lg);
        --sbr_tarj_hover: 0 10px 30px var(--sbra_md);
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI";
        background: linear-gradient(
          135deg,
          var(--pincipal_fondo),
          var(--fd_dos)
        );
        color: var(--text_uno);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .tarjeta_login {
        width: 100%;
        max-width: 400px;
        background: var(--tarj_fd);
        border: 1px solid var(--brd_color);
        border-radius: var(--bdr_rdo);
        padding: var(--spciad_lg);
        box-shadow: var(--sbr_tarj);
      }
      .titulo_login {
        text-align: center;
        margin-bottom: var(--spciad_md);
        font-size: 1.8rem;
        background: linear-gradient(
          45deg,
          var(--az_electri),
          var(--az_electri_lm)
        );
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .grupo_formulario {
        margin-bottom: var(--spciad_md);
        display: flex;
        flex-direction: column;
        gap: var(--spciad_xs);
      }
      .grupo_formulario label {
        color: var(--az_electri);
        font-weight: 600;
      }
      .grupo_formulario input {
        background: var(--fd_tres);
        border: 2px solid var(--brd_color);
        padding: var(--spciad_sm);
        border-radius: var(--bdr_rdo_pqñ);
        color: var(--text_uno);
      }
      .grupo_formulario input:focus {
        border-color: var(--az_electri);
        outline: none;
      }
      .boton_login {
        width: 100%;
        padding: var(--spciad_sm);
        border: none;
        border-radius: var(--bdr_rdo_pqñ);
        font-weight: 600;
        cursor: pointer;
        background: linear-gradient(
          135deg,
          var(--az_electri),
          var(--az_electri_lm)
        );
        color: var(--pincipal_fondo);
        transition: var(--trasi);
      }
      .boton_login:hover {
        opacity: 0.9;
      }
      .boton_login:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .login_social {
        display: flex;
        flex-direction: column;
        gap: var(--spciad_sm);
      }
      .boton_social {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: var(--spciad_sm);
        padding: var(--spciad_sm);
        border-radius: var(--bdr_rdo_pqñ);
        border: 1px solid var(--brd_color);
        background: var(--fd_acento);
        color: var(--text_uno);
        cursor: pointer;
        transition: var(--trasi);
      }
      .boton_social:hover {
        border-color: var(--az_electri);
        background: var(--fd_dos);
      }
      .texto_pie {
        margin-top: var(--spciad_md);
        text-align: center;
        color: var(--text_apa);
      }
    </style>
  </head>

  <body>
    <div class="tarjeta_login">
      <h2 class="titulo_login">Iniciar Sesión</h2>

      <form id="formulario_autenticacion">
        <div class="grupo_formulario">
          <label>Correo</label>

          <input type="email" id="correo_electronico" required />
        </div>

        <div class="grupo_formulario">
          <label>Nombre de usuario</label>

          <input
            type="text"
            id="nombre_usuario"
            required
            placeholder="Nombre visible en la plataforma"
          />
        </div>

        <div class="grupo_formulario">
          <label>Contraseña</label>

          <input type="password" id="contrasena" required />
        </div>

        <button type="submit" class="boton_login" id="boton_enviar">
          Iniciar Sesión / Registrarse
        </button>
      </form>

      <br />

      <div class="login_social">
        <button type="button" class="boton_social" id="boton_google">
          <i class="fab fa-google"></i>
          Google
        </button>

        <button type="button" class="boton_social" id="boton_github">
          <i class="fab fa-github"></i>
          GitHub
        </button>
      </div>

      <div class="texto_pie">
        <p>
          <a
            href="index.html"
            style="color: var(--az_electri); text-decoration: none"
          >
            Volver al inicio
          </a>
        </p>
      </div>
    </div>

    <script>
      Swal.fire({
  title: "Code Time Login - Información y soporte",
  html: `
    <div style="
      padding:20px;
      border-radius:12px;
      background:rgba(0,212,255,0.08);
      border:1px solid rgba(0,212,255,0.2);
      text-align:left;
      color:white;
      line-height:1.6;
    ">
      <h3 style="
        color:#00d4ff;
        margin-bottom:15px;
        text-align:center;
      ">
        Información importante
      </h3>

      <p>
        Si creas una cuenta con <b>Google</b> o <b>GitHub</b>,
        no podrás registrarte nuevamente usando correo,
        nombre de usuario y contraseña manualmente,
        ya que ese correo quedará vinculado al proveedor
        que utilizaste.
      </p>

      <br>

      <p>
        Tampoco podrás iniciar sesión escribiendo el correo
        y la contraseña si tu cuenta fue creada con Google
        o GitHub. Debes iniciar sesión usando el mismo botón
        con el que te registraste.
      </p>

      <br>

      <ul style="padding-left:20px;">
        <li>
          Si te registraste con Google,
          inicia sesión con el botón de Google.
        </li>

        <li>
          Si te registraste con GitHub,
          inicia sesión con el botón de GitHub.
        </li>
      </ul>

      <br>

      <p>
        Igualmente, si creaste tu cuenta manualmente usando
        correo, nombre de usuario y contraseña,
        no podrás iniciar sesión con Google o GitHub
        usando ese mismo correo.
      </p>

      <br>

      <p>
        Debes entrar usando el correo y la contraseña
        que registraste.
      </p>

      <br>

      <p>
        Si olvidaste tu contraseña o tienes algún problema
        con tu cuenta, puedes contactar al soporte desde
        Discord.
      </p>

      <br>

      <p>
        El botón de Discord está en la página principal,
        en la parte superior derecha.
      </p>

      <br>

      <a
        href="index.html"
        target="_blank"
        style="
          color:#00d4ff;
          text-decoration:none;
          font-weight:bold;
        "
      >
        Ir a la página principal
      </a>
    </div>
  `,
  width: 700
});
      const supabaseClient = window.supabase.createClient(
        "https://ttmrvogucsmujegurmvi.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0bXJ2b2d1Y3NtdWplZ3VybXZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MDE2OTIsImV4cCI6MjA5Mjk3NzY5Mn0.8NrHzYYIXrTYOpdLJafAemXnZ8bJ1DhVwSU7hQx_3pQ",
      );

      const email = document.getElementById("correo_electronico");
      const username = document.getElementById("nombre_usuario");
      const password = document.getElementById("contrasena");

      const authForm = document.getElementById("formulario_autenticacion");

      const submitBtn = document.getElementById("boton_enviar");

      const googleBtn = document.getElementById("boton_google");
      const githubBtn = document.getElementById("boton_github");

      /* ============================= */
      /* ALERTAS */
      /* ============================= */

      function showError(msg) {
        Swal.fire({
          icon: "error",
          title: "Error",
          text: msg,
          confirmButtonText: "Entendido",
        });
      }

      function showWarning(msg) {
        Swal.fire({
          icon: "warning",
          title: "Advertencia",
          text: msg,
          confirmButtonText: "Entendido",
        });
      }

      function showSuccess(msg) {
        Swal.fire({
          icon: "success",
          title: "Éxito",
          text: msg,
          confirmButtonText: "Continuar",
        });
      }

      function showLoading(title = "Cargando...") {
        Swal.fire({
          title,
          html: "Espera un momento...",
          allowOutsideClick: false,
          didOpen: () => {
            Swal.showLoading();
          },
        });
      }

      /* ============================= */
      /* GUARDAR USUARIO */
      /* ============================= */

      function saveUserToStorage(user, session) {
        localStorage.setItem("user", JSON.stringify(user));

        localStorage.setItem("session", JSON.stringify(session));
      }

      /* ============================= */
      /* VERIFICAR SESIÓN */
      /* ============================= */

      async function checkUserSession() {
        const { data } = await supabaseClient.auth.getSession();

        if (data?.session?.user) {
          saveUserToStorage(data.session.user, data.session);

          window.location.href = "CodeTime.html";
        }
      }

      checkUserSession();

      /* ============================= */
      /* LOGIN / REGISTER */
      /* ============================= */

      authForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const emailVal = email.value.trim();

        const usernameVal = username.value.trim();

        const passwordVal = password.value;

        /* VALIDACIONES */

        if (!emailVal || !usernameVal || !passwordVal) {
          showWarning("Por favor completa todos los campos");

          return;
        }

        if (usernameVal.length < 3) {
          showWarning("El nombre de usuario debe tener al menos 3 caracteres");

          return;
        }

        if (passwordVal.length < 6) {
          showWarning("La contraseña debe tener al menos 6 caracteres");

          return;
        }

        submitBtn.disabled = true;

        showLoading("Verificando cuenta...");

        try {
          /* LOGIN */

          const { data: signInData, error: signInError } =
            await supabaseClient.auth.signInWithPassword({
              email: emailVal,
              password: passwordVal,
            });

          /* SI FALLA LOGIN */

          if (signInError) {
            /* CREAR CUENTA */

            if (signInError.message.includes("Invalid login credentials")) {
              Swal.close();

              showLoading("Creando cuenta...");

              const { data: signUpData, error: signUpError } =
                await supabaseClient.auth.signUp({
                  email: emailVal,
                  password: passwordVal,
                });

              if (signUpError) {
                Swal.close();

                showError(signUpError.message || "Error al crear la cuenta");

                submitBtn.disabled = false;

                return;
              }

              const { error: profileError } = await supabaseClient
                .from("perfiles")
                .insert({
                  id: signUpData.user.id,
                  username: usernameVal,
                });

              if (profileError) {
                Swal.close();

                showError(
                  "Cuenta creada pero falló guardar perfil: " +
                    profileError.message,
                );

                submitBtn.disabled = false;

                return;
              }

              Swal.close();

              showSuccess("¡Cuenta creada! Revisa tu email para confirmar.");

              authForm.reset();

              submitBtn.disabled = false;
            } else {
              Swal.close();

              showError(signInError.message || "Error al iniciar sesión");

              submitBtn.disabled = false;
            }
          } else {
            /* VERIFICAR PERFIL */

            const { data: perfil } = await supabaseClient
              .from("perfiles")
              .select("id")
              .eq("id", signInData.user.id)
              .maybeSingle();

            if (!perfil) {
              const usernameToUse =
                usernameVal ||
                signInData.user.user_metadata?.full_name ||
                signInData.user.email.split("@")[0];

              const { error: profileError } = await supabaseClient
                .from("perfiles")
                .insert({
                  id: signInData.user.id,
                  username: usernameToUse,
                });

              if (profileError) {
                Swal.close();

                showError("Error al crear perfil: " + profileError.message);

                submitBtn.disabled = false;

                return;
              }
            }

            Swal.close();

            showSuccess("¡Sesión iniciada!");

            saveUserToStorage(signInData.user, signInData.session);

            setTimeout(() => {
              window.location.href = "CodeTime.html";
            }, 1000);
          }
        } catch (err) {
          Swal.close();

          showError("Ocurrió un error: " + err.message);
        }

        submitBtn.disabled = false;
      });

      /* ============================= */
      /* GOOGLE */
      /* ============================= */

      googleBtn.addEventListener("click", async (e) => {
        e.preventDefault();

        try {
          const { error } = await supabaseClient.auth.signInWithOAuth({
            provider: "google",

            options: {
              redirectTo: window.location.origin + "/login.html",
            },
          });

          if (error) {
            showError("Error con Google: " + error.message);
          }
        } catch (err) {
          showError(err.message);
        }
      });

      /* ============================= */
      /* GITHUB */
      /* ============================= */

      githubBtn.addEventListener("click", async (e) => {
        e.preventDefault();

        try {
          const { error } = await supabaseClient.auth.signInWithOAuth({
            provider: "github",

            options: {
              redirectTo: window.location.origin + "/login.html",
            },
          });

          if (error) {
            showError("Error con GitHub: " + error.message);
          }
        } catch (err) {
          showError(err.message);
        }
      });
    </script>
  </body>
</html>
