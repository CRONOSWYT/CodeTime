<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Login - Code Time</title>

        <link rel="icon" href="icons/logo.ico" />

        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        />

        <link rel="stylesheet" href="styles/general.css" />

        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <style>
            body {
                font-family: "Segoe UI";
                background: linear-gradient(
                    135deg,
                    var(--pincipal_fondo),
                    var(--fd_dos)
                );
                color: var(--text_uno);
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
            }
        </style>
    </head>

    <body>
        <div class="tarjeta_login">
            <h2 class="titulo_login">Iniciar Sesión</h2>

            <form id="formulario_autenticacion">
                <div class="grupo_formulario">
                    <label>Correo</label>
                    <input type="email" id="correo_electronico" required />
                </div>

                <div class="grupo_formulario">
                    <label>Nombre de usuario</label>
                    <input
                        type="text"
                        id="nombre_usuario"
                        required
                        placeholder="Nombre visible en la Pagina"
                    />
                </div>

                <div class="grupo_formulario" id="contenedor_contrasena">
                    <label>Contraseña</label>
                    <input type="password" id="contrasena" required />
                </div>

                <button type="submit" class="boton_login" id="boton_enviar">
                    Iniciar Sesión / Registrarse
                </button>
            </form>

            <br />

            <div class="login_social">
                <button type="button" class="boton_social" id="boton_google">
                    <i class="fab fa-google"></i>
                    Google
                </button>

                <button type="button" class="boton_social" id="boton_github">
                    <i class="fab fa-github"></i>
                    GitHub
                </button>
            </div>

            <div class="texto_pie">
                <p>
                    <a
                        href="index.html"
                        style="color: var(--az_electri); text-decoration: none"
                    >
                        Volver al inicio
                    </a>
                </p>
            </div>
        </div>

        <script>
            Swal.fire({
                title: "Code Time Login - Información y soporte",
                html: `
          <div style="
            padding:20px;
            border-radius:12px;
            background:rgba(0,212,255,0.08);
            border:1px solid rgba(0,212,255,0.2);
            text-align:left;
            color:white;
            line-height:1.6;
          ">
            <h3 style="
              color:#00d4ff;
              margin-bottom:15px;
              text-align:center;
            ">
              Información importante
            </h3>

            <p>
              Si creas una cuenta con <b>Google</b> o <b>GitHub</b>,
              no podrás registrarte nuevamente usando correo,
              nombre de usuario y contraseña manualmente,
              ya que ese correo quedará vinculado al proveedor
              que utilizaste.
            </p>

            <br>

            <p>
              Tampoco podrás iniciar sesión escribiendo el correo
              y la contraseña si tu cuenta fue creada con Google
              o GitHub. Debes iniciar sesión usando el mismo botón
              con el que te registraste.
            </p>

            <br>

            <ul style="padding-left:20px;">
              <li>
                Si te registraste con Google,
                inicia sesión con el botón de Google.
              </li>

              <li>
                Si te registraste con GitHub,
                inicia sesión con el botón de GitHub.
              </li>
            </ul>

            <br>

            <p>
              Igualmente, si creaste tu cuenta manualmente usando
              correo, nombre de usuario y contraseña,
              no podrás iniciar sesión con Google o GitHub
              usando ese mismo correo.
            </p>

            <br>

            <p>
              Debes entrar usando el correo y la contraseña
              que registraste.
            </p>

            <br>

            <p>
              Si olvidaste tu contraseña o tienes algún problema
              con tu cuenta, puedes contactar al soporte desde
              Discord.
            </p>

            <br>

            <p>
              El botón de Discord lo puedes econtrar
              En la página principal puedes encontrarlo en el botón <b>Redes</b> de la parte superior derecha.
            </p>

            <br>

            <a
              href="index.html"
              target="_blank"
              style="
                color:#00d4ff;
                text-decoration:none;
                font-weight:bold;
              "
            >
              Ir a la página principal
            </a>
          </div>
        `,
                width: 700,
            });

            const supabaseClient = window.supabase.createClient(
                "https://ttmrvogucsmujegurmvi.supabase.co",
                "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0bXJ2b2d1Y3NtdWplZ3VybXZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MDE2OTIsImV4cCI6MjA5Mjk3NzY5Mn0.8NrHzYYIXrTYOpdLJafAemXnZ8bJ1DhVwSU7hQx_3pQ",
            );

            const email = document.getElementById("correo_electronico");
            const username = document.getElementById("nombre_usuario");
            const password = document.getElementById("contrasena");
            const containerPassword = document.getElementById(
                "contenedor_contrasena",
            );
            const authForm = document.getElementById(
                "formulario_autenticacion",
            );
            const submitBtn = document.getElementById("boton_enviar");
            const googleBtn = document.getElementById("boton_google");
            const githubBtn = document.getElementById("boton_github");

            let sessionUser = null;
            let sessionUserSession = null;

            /* ============================= */
            /* ALERTAS */
            /* ============================= */
            function showError(msg) {
                Swal.fire({
                    icon: "error",
                    title: "Error",
                    text: msg,
                    confirmButtonText: "Entendido",
                });
            }
            function showWarning(msg) {
                Swal.fire({
                    icon: "warning",
                    title: "Advertencia",
                    text: msg,
                    confirmButtonText: "Entendido",
                });
            }
            function showSuccess(msg) {
                Swal.fire({ icon: "success", title: "Éxito", text: msg });
            }
            function showLoading(title = "Cargando...") {
                Swal.fire({
                    title,
                    html: "Espera un momento...",
                    allowOutsideClick: false,
                    didOpen: () => {
                        Swal.showLoading();
                    },
                });
            }

            async function logAudit(
                actionType,
                entityType,
                entityId,
                description,
                oldValues = null,
                newValues = null,
            ) {
                try {
                    await supabaseClient.from("audit_logs").insert([
                        {
                            user_id: entityId,
                            action_type: actionType,
                            entity_type: entityType,
                            entity_id: entityId,
                            page_url: window.location.href,
                            user_agent: navigator.userAgent,
                            old_values: oldValues,
                            new_values: newValues,
                            description,
                        },
                    ]);
                } catch (e) {
                    console.error("Audit log error:", e);
                }
            }

            function saveUserToStorage(user, session) {
                localStorage.setItem("user", JSON.stringify(user));
                localStorage.setItem("session", JSON.stringify(session));
            }

            async function ensureProfileForUser(userId) {
                const { data: perfil, error } = await supabaseClient
                    .from("perfiles")
                    .select("id, username")
                    .eq("id", userId)
                    .maybeSingle();
                if (error) {
                    showError("Error comprobando perfil: " + error.message);
                    return null;
                }
                return perfil;
            }

            function setFormStateForOAuth(user) {
                email.value = user.email || "";
                email.disabled = true;
                if (containerPassword) containerPassword.style.display = "none";
                password.removeAttribute("required"); // SOLUCIÓN AL BUG DE BLOQUEO HTML5
                submitBtn.textContent = "Guardar Nombre de Usuario";
                showWarning(
                    "Tu sesión de Google/GitHub está activa. Completa tu nombre de usuario para continuar.",
                );
            }

            async function checkUserSession() {
                const { data } = await supabaseClient.auth.getSession();
                if (data?.session?.user) {
                    sessionUser = data.session.user;
                    sessionUserSession = data.session;

                    const perfil = await ensureProfileForUser(sessionUser.id);
                    if (
                        perfil &&
                        perfil.username &&
                        perfil.username.trim().length >= 3
                    ) {
                        saveUserToStorage(sessionUser, data.session);
                        window.location.href = "index.html";
                        return;
                    }
                    // Si falta perfil, delegar la solicitud de username a la página principal (index.html)
                    // para mantener el mismo comportamiento que las otras páginas.
                    window.location.href = "index.html";
                }
            }

            checkUserSession();

            /* ============================= */
            /* SUBMIT FORMULARIO */
            /* ============================= */
            authForm.addEventListener("submit", async (e) => {
                e.preventDefault();

                const emailVal = email.value.trim();
                const usernameVal = username.value.trim();
                const passwordVal = password.value;

                if (
                    !emailVal ||
                    !usernameVal ||
                    (!sessionUser && !passwordVal)
                ) {
                    showWarning(
                        "Por favor completa todos los campos requeridos",
                    );
                    return;
                }

                if (usernameVal.length < 3) {
                    showWarning(
                        "El nombre de usuario debe tener al menos 3 caracteres",
                    );
                    return;
                }

                submitBtn.disabled = true;

                // --- CASO A: EL USUARIO YA ESTÁ AUTENTICADO CON OAUTH (FALTA PERFIL) ---
                if (sessionUser) {
                    showLoading("Guardando perfil...");
                    try {
                        const { error: profileError } = await supabaseClient
                            .from("perfiles")
                            .insert({
                                id: sessionUser.id,
                                username: usernameVal,
                            });

                        if (profileError) {
                            Swal.close();
                            showError(
                                "Error al guardar perfil: " +
                                    profileError.message,
                            );
                            submitBtn.disabled = false;
                            return;
                        }

                        await logAudit(
                            "INSERT",
                            "perfil",
                            sessionUser.id,
                            `Perfil OAuth creado: ${usernameVal}`,
                            null,
                            {
                                username: usernameVal,
                                provider: sessionUser.app_metadata.provider,
                            },
                        );

                        Swal.close();
                        showSuccess("¡Perfil configurado con éxito!");
                        saveUserToStorage(sessionUser, sessionUserSession);
                        try {
                            localStorage.setItem(
                                "perfil",
                                JSON.stringify({
                                    id: sessionUser.id,
                                    username: usernameVal,
                                }),
                            );
                        } catch (e) {}
                        setTimeout(() => {
                            window.location.href = "index.html";
                        }, 1500);
                    } catch (err) {
                        Swal.close();
                        showError("Error: " + err.message);
                        submitBtn.disabled = false;
                    }
                    return;
                }

                // --- CASO B: LOGIN / REGISTRO TRADICIONAL (CORREO Y CONTRASEÑA) ---
                if (passwordVal.length < 6) {
                    showWarning(
                        "La contraseña debe tener al menos 6 caracteres",
                    );
                    submitBtn.disabled = false;
                    return;
                }

                showLoading("Verificando cuenta...");
                try {
                    const { data: signInData, error: signInError } =
                        await supabaseClient.auth.signInWithPassword({
                            email: emailVal,
                            password: passwordVal,
                        });

                    if (signInError) {
                        if (
                            signInError.message.includes(
                                "Invalid login credentials",
                            ) ||
                            signInError.message.includes("User not found")
                        ) {
                            Swal.close();
                            showLoading("Creando cuenta...");

                            const { data: signUpData, error: signUpError } =
                                await supabaseClient.auth.signUp({
                                    email: emailVal,
                                    password: passwordVal,
                                });

                            if (signUpError) {
                                Swal.close();
                                showError(
                                    signUpError.message ||
                                        "Error al crear la cuenta",
                                );
                                submitBtn.disabled = false;
                                return;
                            }

                            if (signUpData?.user) {
                                const { error: profileError } =
                                    await supabaseClient
                                        .from("perfiles")
                                        .insert({
                                            id: signUpData.user.id,
                                            username: usernameVal,
                                        });

                                if (profileError) {
                                    Swal.close();
                                    showError(
                                        "Cuenta creada pero falló guardar perfil: " +
                                            profileError.message,
                                    );
                                    submitBtn.disabled = false;
                                    return;
                                }

                                await logAudit(
                                    "INSERT",
                                    "perfil",
                                    signUpData.user.id,
                                    `Cuenta creada: ${usernameVal}`,
                                    null,
                                    {
                                        email: emailVal,
                                        username: usernameVal,
                                        provider: "password",
                                    },
                                );

                                Swal.close();

                                if (signUpData.session) {
                                    showSuccess(
                                        "¡Cuenta creada con éxito! Iniciando sesión...",
                                    );
                                    saveUserToStorage(
                                        signUpData.user,
                                        signUpData.session,
                                    );
                                    try {
                                        localStorage.setItem(
                                            "perfil",
                                            JSON.stringify({
                                                id: signUpData.user.id,
                                                username: usernameVal,
                                            }),
                                        );
                                    } catch (e) {}
                                    setTimeout(() => {
                                        window.location.href = "index.html";
                                    }, 1500);
                                } else {
                                    showWarning(
                                        "Cuenta creada. Por favor verifica tu correo electrónico.",
                                    );
                                    authForm.reset();
                                    submitBtn.disabled = false;
                                }
                            }
                        } else {
                            Swal.close();
                            showError(
                                signInError.message ||
                                    "Error al iniciar sesión",
                            );
                            submitBtn.disabled = false;
                        }
                    } else {
                        /* PERFIL EN LOGIN TRADICIONAL */
                        const { data: perfil } = await supabaseClient
                            .from("perfiles")
                            .select("id")
                            .eq("id", signInData.user.id)
                            .maybeSingle();

                        if (!perfil) {
                            const { error: profileError } = await supabaseClient
                                .from("perfiles")
                                .insert({
                                    id: signInData.user.id,
                                    username: usernameVal,
                                });

                            if (profileError) {
                                Swal.close();
                                showError(
                                    "Error al crear perfil: " +
                                        profileError.message,
                                );
                                submitBtn.disabled = false;
                                return;
                            }
                        }

                        Swal.close();
                        showSuccess("¡Sesión iniciada!");
                        await logAudit(
                            "LOGIN",
                            "user",
                            signInData.user.id,
                            "Inicio de sesión",
                            null,
                            { email: emailVal, provider: "password" },
                        );
                        saveUserToStorage(signInData.user, signInData.session);
                        try {
                            localStorage.setItem(
                                "perfil",
                                JSON.stringify({
                                    id: signInData.user.id,
                                    username: usernameVal,
                                }),
                            );
                        } catch (e) {}
                        setTimeout(() => {
                            window.location.href = "index.html";
                        }, 1000);
                    }
                } catch (err) {
                    Swal.close();
                    showError("Ocurrió un error: " + err.message);
                    submitBtn.disabled = false;
                }
            });

            /* ============================= */
            /* PROVEEDORES OAUTH */
            /* ============================= */
            googleBtn.addEventListener("click", async (e) => {
                e.preventDefault();
                try {
                    const { error } = await supabaseClient.auth.signInWithOAuth(
                        {
                            provider: "google",
                            options: {
                                redirectTo:
                                    window.location.origin + "/login.html",
                            },
                        },
                    );
                    if (error) showError("Error con Google: " + error.message);
                } catch (err) {
                    showError(err.message);
                }
            });

            githubBtn.addEventListener("click", async (e) => {
                e.preventDefault();
                try {
                    const { error } = await supabaseClient.auth.signInWithOAuth(
                        {
                            provider: "github",
                            options: {
                                redirectTo:
                                    window.location.origin + "/login.html",
                            },
                        },
                    );
                    if (error) showError("Error con GitHub: " + error.message);
                } catch (err) {
                    showError(err.message);
                }
            });
        </script>
    </body>
</html>
